<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>Name — Contradiction of S</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .name-hero {
      padding: 28px 20px 0;
      text-align: center;
      position: relative;
    }
    .name-stars {
      position: absolute;
      top: 20px; left: 16px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .name-stars-r {
      position: absolute;
      top: 20px; right: 16px;
      display: flex; flex-direction: column; gap: 4px; align-items: flex-end;
    }

    #name-display {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 28px;
      color: var(--burgundy);
      line-height: 1.35;
      text-align: center;
      padding: 28px 24px 20px;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.02em;
      border: 1px dashed rgba(92,26,26,0.15);
      border-radius: 3px;
      margin: 0 20px;
      background: var(--cream);
      transition: opacity 0.25s, transform 0.25s;
    }

    .name-actions {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
    }
    #gen-btn {
      flex: 1;
    }
    #save-current-btn {
      flex-shrink: 0;
      padding: 13px 16px;
      font-size: 12px;
    }
    #save-current-btn.saved { color: var(--red); border-color: var(--red); }

    .name-history-section {
      padding: 0 20px 24px;
    }
    .history-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .history-header h2 {
      font-family: 'IM Fell English', serif;
      font-size: 14px;
      color: var(--warm-gray);
      letter-spacing: 0.08em;
      font-weight: normal;
    }
    #name-history-empty {
      font-style: italic;
      font-family: 'IM Fell English', serif;
      font-size: 13px;
      color: var(--muted);
      padding: 12px 0;
    }

    .scroll-fade {
      max-height: 300px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(92,26,26,0.15) transparent;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <div class="eyebrow">Who you might be</div>
      <h1 class="page-title">Poetic <em>Names</em></h1>
      <p class="page-subtitle">Each name is a small fiction, a temporary self</p>
    </div>

    <div class="name-hero">
      <div class="name-stars" aria-hidden="true">
        <svg class="star-float" width="12" height="12" viewBox="0 0 24 24" fill="var(--burgundy)" opacity="0.25"><path d="M12 2l2.2 6.6H21l-5.6 4 2.2 6.6L12 15.2 6.4 19.2l2.2-6.6L3 8.6h6.8z"/></svg>
        <svg class="star-float-2" width="8" height="8" viewBox="0 0 24 24" fill="var(--burgundy)" opacity="0.18"><path d="M12 2l2.2 6.6H21l-5.6 4 2.2 6.6L12 15.2 6.4 19.2l2.2-6.6L3 8.6h6.8z"/></svg>
      </div>
      <div class="name-stars-r" aria-hidden="true">
        <svg class="star-float-3" width="10" height="10" viewBox="0 0 24 24" fill="var(--burgundy)" opacity="0.2"><path d="M12 2l2.2 6.6H21l-5.6 4 2.2 6.6L12 15.2 6.4 19.2l2.2-6.6L3 8.6h6.8z"/></svg>
        <svg class="star-float" width="15" height="15" viewBox="0 0 24 24" fill="var(--burgundy)" opacity="0.15"><path d="M12 2l2.2 6.6H21l-5.6 4 2.2 6.6L12 15.2 6.4 19.2l2.2-6.6L3 8.6h6.8z"/></svg>
      </div>
    </div>

    <!-- Current name display -->
    <div id="name-display" aria-live="polite">—</div>

    <!-- Actions -->
    <div class="name-actions">
      <button class="btn btn-primary" id="gen-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        Generate name
      </button>
      <button class="btn btn-ghost" id="save-current-btn">☆ Save</button>
    </div>

    <!-- History -->
    <div class="name-history-section">
      <div class="history-header">
        <h2>Past names</h2>
      </div>
      <p id="name-history-empty" style="display:none;">No names generated yet</p>
      <div class="scroll-fade">
        <div id="name-history-list"></div>
      </div>
    </div>

  </div>

  <nav class="bottom-nav" aria-label="Main navigation">
    <span class="nav-d-label">Home</span>
    <div class="nav-d-dots">
      <a href="index.html"   class="nav-dot"        aria-label="Home"></a>
      <a href="gesture.html" class="nav-dot"        aria-label="Record"></a>
      <a href="ar.html"      class="nav-dot"        aria-label="Archive"></a>
    </div>
  </nav>

  <script src="js/app.js"></script>
  <script src="js/swipe-nav.js"></script>
  <script src="js/name.js"></script>
</body>
</html>
