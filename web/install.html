<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#060A0E">
  <title>Install — The Contradiction of S</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #060A0E;
      color: #C8D8E0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      gap: 0;
    }
    .app-icon {
      width: 88px;
      height: 88px;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    h1 {
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #C8D8E0;
      margin-bottom: 6px;
      text-align: center;
    }
    .eyebrow {
      font-size: 11px;
      color: rgba(200,216,224,0.4);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 48px;
      text-align: center;
    }

    #install-btn {
      display: none;
      width: 100%;
      max-width: 300px;
      background: transparent;
      border: 1px solid rgba(200,216,224,0.55);
      color: #C8D8E0;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 15px 24px;
      cursor: pointer;
      margin-bottom: 36px;
    }
    #install-btn.visible { display: block; }
    #install-btn:active { background: rgba(200,216,224,0.08); }

    .divider {
      font-size: 11px;
      color: rgba(200,216,224,0.25);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    #install-btn.visible + .divider { display: block; }

    .steps {
      width: 100%;
      max-width: 300px;
      margin-bottom: 48px;
    }
    .step {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
    }
    .step-num {
      width: 24px;
      height: 24px;
      border: 1px solid rgba(200,216,224,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
      margin-top: 1px;
      color: rgba(200,216,224,0.4);
    }
    .step-text {
      font-size: 14px;
      line-height: 1.65;
      color: rgba(200,216,224,0.7);
    }
    .step-text strong {
      color: #C8D8E0;
      font-weight: 500;
    }

    .back {
      font-size: 11px;
      color: rgba(200,216,224,0.3);
      text-decoration: none;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .back:hover { color: rgba(200,216,224,0.6); }
  </style>
</head>
<body>

  <svg class="app-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <rect width="512" height="512" fill="#060A0E"/>
    <g transform="translate(256,256) scale(4.8) translate(-48,-45)">
      <path d="M44,8 L55,30 L88,22 L63,45 L76,81 L48,60 L20,82 L35,44 L8,22 L41,29 Z"
            stroke="#C8D8E0" stroke-opacity="0.62" stroke-width="3"
            fill="#C8D8E0" fill-opacity="0.05" stroke-linejoin="round"/>
      <line x1="44" y1="8"  x2="20" y2="82"
            stroke="#D7384C" stroke-opacity="0.55" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="88" y1="22" x2="20" y2="82"
            stroke="#D7384C" stroke-opacity="0.45" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="8"  y1="22" x2="76" y2="81"
            stroke="#D7384C" stroke-opacity="0.38" stroke-width="2.0" stroke-linecap="round"/>
      <line x1="44" y1="8"  x2="76" y2="81"
            stroke="#D7384C" stroke-opacity="0.32" stroke-width="1.8" stroke-linecap="round"/>
    </g>
  </svg>

  <h1>The Contradiction of S</h1>
  <div class="eyebrow">Add to home screen</div>

  <button id="install-btn">Install App</button>
  <div class="divider">or follow these steps</div>

  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">Open this page in <strong>Chrome</strong> on your device</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">Tap the <strong>⋮</strong> menu in the top-right corner</div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text">Tap <strong>Add to Home screen</strong></div>
    </div>
    <div class="step">
      <div class="step-num">4</div>
      <div class="step-text">Tap <strong>Add</strong> — the app icon will appear on your home screen</div>
    </div>
  </div>

  <a href="./index.html" class="back">← back to the site</a>

  <script>
    let deferredPrompt = null;
    const btn = document.getElementById('install-btn');

    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      btn.classList.add('visible');
    });

    btn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      if (outcome === 'accepted') btn.classList.remove('visible');
    });

    window.addEventListener('appinstalled', () => {
      btn.classList.remove('visible');
    });
  </script>
</body>
</html>
