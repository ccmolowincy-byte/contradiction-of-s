      font-size: 16px;
      font-style: italic;
      letter-spacing: 0.06em;
      border-radius: 2px;
      cursor: not-allowed;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.35s;
    }
    #draw-release-btn:not(:disabled) {
      color: rgba(240,234,224,0.84);
      border-color: rgba(240,234,224,0.42);
      background: rgba(92,26,26,0.22);

    #draw-release-btn:not(:disabled):active {

      border-color: rgba(240,234,224,0.65);
    }

    /* ── Three.js ribbon preview overlay ───────────────────────────── */
    #draw-preview-overlay {
      position: absolute;
      inset: 0;
      z-index: 30;
      background: rgba(8,4,4,0.86);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.55s;
    }
    #draw-preview-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }
    #draw-preview-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    #draw-preview-label {
      position: absolute;
      bottom: 56px; left: 0; right: 0;
      text-align: center;
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 13px;
      font-style: italic;
      color: rgba(240,234,224,0.42);
      letter-spacing: 0.06em;
      pointer-events: none;
      z-index: 2;
    }

    /* ── Success overlay ────────────────────────────────────────────── */
    #draw-success {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: radial-gradient(ellipse at 50% 42%,
        rgba(92,26,26,0.16) 0%,
        rgba(8,4,4,0.96) 100%
      );
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s;
    }
    #draw-success.visible {
      opacity: 1;
      pointer-events: auto;
    }
    #draw-success-title {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 20px;
      font-style: italic;
      color: rgba(240,234,224,0.86);
      text-align: center;
      padding: 0 44px;
      line-height: 1.4;

    #draw-success-sub {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 13px;
      font-style: italic;
      color: rgba(240,234,224,0.36);
      text-align: center;
      padding: 0 48px;
      line-height: 1.7;
    }
    #draw-again-btn {
      margin-top: 18px;
      padding: 13px 38px;
      background: transparent;
      border: 1.5px solid rgba(240,234,224,0.28);
      color: rgba(240,234,224,0.62);
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 15px;
      font-style: italic;
      letter-spacing: 0.05em;
      border-radius: 2px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }
    #draw-again-btn:active {
      background: rgba(240,234,224,0.08);
      border-color: rgba(240,234,224,0.55);
    }
    #draw-view-archive {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(240,234,224,0.28);
      text-decoration: none;
      padding: 8px;
      -webkit-tap-highlight-color: transparent;
    }

  <!-- Scripts: Supabase → App → Draw logic → Three.js preview module -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/draw.js"></script>

  <!-- Three.js ribbon preview — runs as ES module, listens for pain-trace-saved event -->
  <script type="module">
    import * as THREE from 'three';

    const previewOverlay = document.getElementById('draw-preview-overlay');
    const previewCanvas  = document.getElementById('draw-preview-canvas');
    let   renderer       = null;
    let   animId         = null;

    document.addEventListener('pain-trace-saved', (e) => {
      showRibbonPreview(e.detail.strokes, e.detail.colour);
    });

    function showRibbonPreview(strokes, colour) {
      /* Flatten all strokes into one point list */
      const allPts = strokes.flat();
      if (allPts.length < 3) {
        window.__drawShowSuccess && window.__drawShowSuccess();
        return;
      }

      /* Map normalised [0,1] coords into 3D world space */
      const pts3D = allPts.map((p, i) => new THREE.Vector3(
        (p.x - 0.5) * 3.2,
        -(p.y - 0.5) * 3.2,
        Math.sin((i / allPts.length) * Math.PI * 6) * 0.12
      ));

      /* Renderer */
      const stage = document.getElementById('draw-stage');
      const W   = stage.offsetWidth  || window.innerWidth;
      const H   = stage.offsetHeight || (window.innerHeight - 68);
      const dpr = Math.min(window.devicePixelRatio || 1, 2);

      if (renderer) { renderer.dispose(); renderer = null; }
      renderer = new THREE.WebGLRenderer({ canvas: previewCanvas, alpha: true, antialias: true });
      renderer.setPixelRatio(dpr);
      renderer.setSize(W, H);
      renderer.setClearColor(0x000000, 0);
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      const scene  = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(50, W / H, 0.01, 100);
      camera.position.set(0, 0, 5.5);

      /* Lighting */
      scene.add(new THREE.AmbientLight(0xffeedd, 0.7));
      const key = new THREE.DirectionalLight(0xffffff, 1.4);
      key.position.set(2, 3, 4);
      scene.add(key);
      const fill = new THREE.DirectionalLight(0x8090aa, 0.45);
      fill.position.set(-3, -1, 2);
      scene.add(fill);

      /* Ribbon geometry */
      const curve   = new THREE.CatmullRomCurve3(pts3D, false, 'catmullrom', 0.5);
      const segs    = Math.min(allPts.length * 4, 400);
      const geo     = new THREE.TubeGeometry(curve, segs, 0.045, 7, false);

      const col = new THREE.Color(colour);
      const mat = new THREE.MeshStandardMaterial({
        color:            col,
        emissive:         col,
        emissiveIntensity: 0.18,
        roughness:        0.55,
        metalness:        0.08,
        transparent:      true,
        opacity:          0.92,
        side:             THREE.DoubleSide,
      });

      /* Try to load X-ray texture — fail silently if not yet prepared */
      new THREE.TextureLoader().load(
        'assets/textures/xray-01.png',
        (tex) => {
          tex.wrapS = THREE.RepeatWrapping;
          tex.repeat.set(7, 1);
          mat.map      = tex;
          mat.alphaMap = tex;
          mat.alphaTest = 0.05;
          mat.needsUpdate = true;
        },
        undefined,
        () => { /* no texture yet — plain material is fine */ }
      );

      const mesh = new THREE.Mesh(geo, mat);
      scene.add(mesh);

      /* Show overlay */
      previewOverlay.classList.add('visible');

      /* Animate ~4 s then fade and hand off to success screen */
      let elapsed = 0, prev = performance.now();

      function tick(now) {
        const dt = Math.min((now - prev) / 1000, 0.05);
        prev = now;
        elapsed += dt;

        mesh.rotation.y = elapsed * 0.44;
        mesh.rotation.x = Math.sin(elapsed * 0.28) * 0.12;
        renderer.render(scene, camera);

        if (elapsed < 3.8) {
          animId = requestAnimationFrame(tick);
        } else {
          /* Fade out */
          previewOverlay.style.transition = 'opacity 0.7s';
          previewOverlay.style.opacity    = '0';
          setTimeout(() => {
            previewOverlay.classList.remove('visible');
            previewOverlay.style.opacity    = '';
            previewOverlay.style.transition = '';
            geo.dispose();
            mat.dispose();
            if (renderer) { renderer.dispose(); renderer = null; }
            window.__drawShowSuccess && window.__drawShowSuccess();
          }, 750);
        }
      }

      animId = requestAnimationFrame(tick);
    }
  </script>
