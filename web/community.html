<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
  <title>Community — Contradiction of S</title>
  <link rel="stylesheet" href="style.css">
  <script src="js/device.js"></script>
  <style>
    body { overflow-x: hidden; overflow-y: auto; }

    .community-page {
      min-height: calc(100vh - var(--nav-h));
      padding-bottom: 40px;
    }

    /* ── Header ────────────────────────────────────────────────────────────── */
    .community-header {
      padding: 28px 20px 0;
      text-align: center;
    }
    .community-eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--warm-gray);
      margin-bottom: 8px;
    }
    .community-title {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 26px;
      font-style: italic;
      color: var(--burgundy);
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }
    .community-subtitle {
      font-family: 'IM Fell English', serif;
      font-size: 12px;
      font-style: italic;
      color: var(--muted);
      line-height: 1.6;
      padding: 0 24px;
      margin-bottom: 24px;
    }

    /* ── Submission form ───────────────────────────────────────────────────── */
    .community-form {
      background: var(--cream);
      border: 1px solid rgba(92,26,26,0.12);
      border-radius: 3px;
      margin: 0 16px 24px;
      padding: 18px 16px 20px;
      box-shadow: 0 3px 14px rgba(92,26,26,0.07);
      position: relative;
    }

    .story-textarea {
      width: 100%;
      min-height: 110px;
      background: var(--bg);
      border: 1.5px solid rgba(92,26,26,0.16);
      border-radius: 2px;
      padding: 12px 14px;
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 15px;
      color: var(--ink);
      line-height: 1.55;
      outline: none;
      resize: vertical;
      -webkit-appearance: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .story-textarea:focus {
      border-color: var(--burgundy);
      box-shadow: 0 0 0 2px rgba(92,26,26,0.08);
    }
    .story-textarea::placeholder { color: var(--muted); font-style: italic; }

    .story-nickname {
      width: 100%;
      margin-top: 12px;
      background: transparent;
      border: none;
      border-bottom: 1px dashed rgba(92,26,26,0.22);
      padding: 8px 2px;
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 13px;
      color: var(--burgundy);
      outline: none;
    }
    .story-nickname::placeholder { color: var(--muted); font-style: italic; }

    .story-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }
    .story-counter {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Sticker picker ────────────────────────────────────────────────────── */
    .sticker-section {
      margin-top: 18px;
    }
    .sticker-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--warm-gray);
      margin-bottom: 8px;
    }
    .sticker-picker {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 4px 2px 10px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .sticker-picker::-webkit-scrollbar { display: none; }

    .sp-thumb {
      flex: 0 0 64px;
      width: 64px;
      height: 64px;
      border: 1.5px solid rgba(92,26,26,0.12);
      border-radius: 3px;
      background: var(--bg);
      padding: 4px;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .sp-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }
    .sp-thumb.selected {
      border-color: var(--burgundy);
      box-shadow: 0 0 0 2px rgba(92,26,26,0.12);
      transform: scale(1.06) rotate(-1deg);
    }
    .sp-thumb:active { transform: scale(0.96); }

    .sticker-empty {
      display: none;
      font-family: 'IM Fell English', serif;
      font-size: 12px;
      font-style: italic;
      color: var(--muted);
      padding: 8px 0 4px;
    }
    .sticker-empty.visible { display: block; }
    .sticker-empty a {
      color: var(--burgundy);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .story-submit {
      width: 100%;
      margin-top: 18px;
      padding: 14px 20px;
      background: var(--burgundy);
      color: #fff;
      border: none;
      border-radius: 2px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      filter: drop-shadow(2px 3px 0 rgba(92,26,26,0.25));
      transition: background 0.15s, transform 0.15s, filter 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .story-submit:hover { background: #4a1515; }
    .story-submit:active { transform: translateY(1px); filter: none; }
    .story-submit:disabled {
      background: var(--muted);
      cursor: wait;
      filter: none;
    }

    .community-status {
      display: none;
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 2px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-align: center;
    }
    .community-status.visible { display: block; }
    .community-status.is-success { background: rgba(74,103,65,0.10); color: #4a6741; }
    .community-status.is-error   { background: rgba(139,37,37,0.10); color: #8b2525; }

    /* ── Divider ───────────────────────────────────────────────────────────── */
    .community-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px 20px;
    }
    .community-divider::before,
    .community-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(92,26,26,0.12);
    }
    .community-divider-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'Space Grotesk', sans-serif;
      white-space: nowrap;
    }

    /* ── Floating feed ─────────────────────────────────────────────────────── */
    #community-feed {
      padding: 0 16px;
      column-count: 1;
      column-gap: 18px;
    }

    @media (min-width: 480px) {
      #community-feed { column-count: 2; }
    }

    @media (min-width: 900px) {
      body { max-width: 820px; }
      #community-feed { column-count: 3; }
    }

    /* ── Floating text box ─────────────────────────────────────────────────── */
    .float-card {
      display: inline-block;
      width: 100%;
      margin: var(--fc-margin, 0 0 18px 0);
      background: var(--cream);
      border: 1px solid rgba(92,26,26,0.10);
      border-radius: 3px;
      box-shadow: 0 3px 12px rgba(92,26,26,0.08), 0 1px 2px rgba(0,0,0,0.04);
      transform: rotate(var(--fc-rotate, 0deg));
      transform-origin: 50% 0%;
      break-inside: avoid;
      opacity: 0;
      animation: floatIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: calc(var(--stagger, 0) * 80ms);
      position: relative;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: rotate(var(--fc-rotate, 0deg)) translateY(28px) scale(0.96); }
      to   { opacity: 1; transform: rotate(var(--fc-rotate, 0deg)) translateY(0) scale(1); }
    }

    .float-card:hover {
      z-index: 2;
      box-shadow: 0 8px 26px rgba(92,26,26,0.14);
    }

    .float-sticker {
      padding: 14px 14px 0;
      position: relative;
    }
    .float-sticker::before {
      content: '';
      position: absolute;
      inset: 14px 14px 0;
      background:
        linear-gradient(180deg, rgba(20,14,22,0.45), rgba(20,14,22,0.55)),
        var(--sticker-bg, url('swim/textures/ground/ground_forest.png')) center/cover no-repeat;
      border-radius: 2px;
      z-index: 0;
    }
    .float-sticker img {
      position: relative;
      z-index: 1;
      width: 100%;
      max-height: 180px;
      object-fit: contain;
      display: block;
      border-radius: 2px;
    }

    .float-body { padding: 18px 16px 16px; }

    .float-text {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 14px;
      line-height: 1.65;
      color: var(--ink);
      white-space: pre-wrap;
      margin-bottom: 14px;
    }

    .float-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-top: 1px dashed rgba(92,26,26,0.14);
      padding-top: 10px;
    }
    .float-author {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--burgundy);
    }
    .float-date {
      font-family: 'IM Fell English', serif;
      font-size: 10px;
      font-style: italic;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Empty state ───────────────────────────────────────────────────────── */
    #community-empty {
      display: none;
      text-align: center;
      padding: 48px 32px;
    }
    #community-empty.visible { display: block; }
    #community-empty p {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    /* ── Respect reduced motion ────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .float-card {
        opacity: 1;
        animation: none;
        transform: rotate(var(--fc-rotate, 0deg));
      }
    }
  </style>
</head>
<body class="content">

  <div class="community-page">

    <div class="community-header">
      <div class="community-eyebrow">Contradiction of S</div>
      <div class="community-title">Community</div>
      <p class="community-subtitle">An ongoing archive of invisible things.<br>Drawn, saved, held.</p>
    </div>

    <form id="community-form" class="community-form" autocomplete="off">
      <textarea
        id="story-text"
        class="story-textarea"
        placeholder="Write something that drifts..."
        maxlength="2000"
        aria-label="Your story"></textarea>

      <input
        id="story-nickname"
        class="story-nickname"
        type="text"
        placeholder="Sign your text (optional)"
        maxlength="120"
        aria-label="Optional signature">

      <div class="story-meta-row">
        <span id="story-counter" class="story-counter">0 / 2000</span>
      </div>

      <div class="sticker-section">
        <div class="sticker-label">Attach a paper sticker</div>
        <div id="sticker-picker" class="sticker-picker"></div>
        <div id="sticker-empty" class="sticker-empty">
          <p>No stickers yet. <a href="character.html">Make one in the Character Builder</a>.</p>
        </div>
      </div>

      <button id="story-submit" type="submit" class="story-submit">Float into the forum</button>
      <div id="community-status" class="community-status"></div>
    </form>

    <div class="community-divider">
      <span class="community-divider-label">Floating thoughts</span>
    </div>

    <!-- Feed populated by JS -->
    <div id="community-feed"></div>

    <!-- Empty state -->
    <div id="community-empty">
      <p>No stories have floated by yet.<br>Be the first to leave a trace.</p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/community-types.js"></script>
  <script src="js/community.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
