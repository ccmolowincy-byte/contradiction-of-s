<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>Community — Contradiction of S</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { overflow-x: hidden; overflow-y: auto; }

    .community-page {
      min-height: calc(100vh - var(--nav-h));
      padding-bottom: 40px;
    }

    /* ── Feed header ─────────────────────────────────────────────────────── */
    .community-header {
      padding: 28px 20px 0;
      text-align: center;
    }
    .community-eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--warm-gray);
      margin-bottom: 8px;
    }
    .community-title {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 26px;
      font-style: italic;
      color: var(--burgundy);
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }
    .community-subtitle {
      font-family: 'IM Fell English', serif;
      font-size: 12px;
      font-style: italic;
      color: var(--muted);
      line-height: 1.6;
      padding: 0 24px;
      margin-bottom: 24px;
    }

    /* ── Divider ─────────────────────────────────────────────────────────── */
    .community-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px 20px;
    }
    .community-divider::before,
    .community-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(92,26,26,0.12);
    }
    .community-divider-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'Space Grotesk', sans-serif;
      white-space: nowrap;
    }

    /* ── Feed ────────────────────────────────────────────────────────────── */
    #community-feed {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Contribution card ───────────────────────────────────────────────── */
    .contrib-card {
      background: var(--cream);
      border: 1px solid rgba(92,26,26,0.1);
      border-radius: 2px;
      padding: 0;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    }

    /* slight rotation on alternating cards — scrapbook feel */
    .contrib-card:nth-child(even) {
      transform: rotate(-0.4deg);
    }
    .contrib-card:nth-child(3n) {
      transform: rotate(0.35deg);
    }

    .contrib-card-img {
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      border-bottom: 1px solid rgba(92,26,26,0.08);
      background: #faf6ef;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .contrib-card-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Placeholder when no image */
    .contrib-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .contrib-img-placeholder svg {
      width: 70%; height: 70%;
      opacity: 0.65;
    }

    .contrib-card-body {
      padding: 14px 16px 16px;
    }

    .contrib-prompt {
      font-family: 'IM Fell English', serif;
      font-size: 11px;
      font-style: italic;
      color: var(--warm-gray);
      letter-spacing: 0.03em;
      margin-bottom: 8px;
      line-height: 1.5;
      border-left: 2px solid rgba(92,26,26,0.2);
      padding-left: 8px;
    }

    .contrib-description {
      font-family: 'IM Fell English', serif;
      font-size: 14px;
      color: var(--ink);
      line-height: 1.6;
      margin-bottom: 12px;
      letter-spacing: 0.01em;
    }

    .contrib-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .contrib-nickname {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--burgundy);
    }
    .contrib-date {
      font-family: 'IM Fell English', serif;
      font-size: 10px;
      font-style: italic;
      color: var(--muted);
    }

    /* ── 2-column grid on wider screens ─────────────────────────────────── */
    @media (min-width: 480px) {
      #community-feed {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        align-items: start;
      }
    }

    /* ── Empty state ─────────────────────────────────────────────────────── */
    #community-empty {
      display: none;
      text-align: center;
      padding: 48px 32px;
    }
    #community-empty.visible { display: block; }
    #community-empty p {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      margin-bottom: 16px;
    }

    /* ── User's own section label ────────────────────────────────────────── */
    .contrib-card.own-entry {
      border-color: rgba(92,26,26,0.25);
    }
    .contrib-card.own-entry .contrib-nickname::before {
      content: '✦ ';
      font-size: 7px;
    }

    /* ── Delete button ───────────────────────────────────────────────────── */
    .contrib-delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 6px;
      color: var(--muted);
      font-size: 11px;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.06em;
      opacity: 0.55;
      transition: opacity 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .contrib-delete-btn:hover,
    .contrib-delete-btn:active { opacity: 1; color: var(--burgundy); }

    /* ── CTA to create ───────────────────────────────────────────────────── */
    .community-cta {
      margin: 24px 20px 0;
      padding: 16px 20px;
      background: rgba(92,26,26,0.05);
      border: 1px dashed rgba(92,26,26,0.2);
      border-radius: 2px;
      text-align: center;
    }
    .community-cta p {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      color: var(--warm-gray);
      font-size: 12px;
      line-height: 1.6;
      margin-bottom: 10px;
    }
    .community-cta a {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 12px;
      color: var(--burgundy);
      text-decoration: none;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="community-page">

    <div class="community-header">
      <div class="community-eyebrow">Contradiction of S</div>
      <div class="community-title">Community</div>
      <p class="community-subtitle">An ongoing archive of invisible things.<br>Drawn, saved, shared.</p>
    </div>

    <div class="community-divider">
      <span class="community-divider-label">Contributions</span>
    </div>

    <!-- Feed populated by JS -->
    <div id="community-feed"></div>

    <!-- Empty state -->
    <div id="community-empty">
      <p>No contributions yet.<br>Make a sticker and share it here.</p>
      <a href="sticker.html" class="btn btn-ghost" style="display:inline-flex;">Make a sticker →</a>
    </div>

    <!-- CTA -->
    <div class="community-cta">
      <p>Your drawings are part of this archive.<br>Save a sticker and publish it to the community.</p>
      <a href="sticker.html">Draw something →</a>
    </div>

  </div>

  <nav class="bottom-nav" aria-label="Main navigation">
    <span class="nav-d-label">Home</span>
    <div class="nav-d-dots">
      <a href="index.html"   class="nav-dot"        aria-label="Home"></a>
      <a href="gesture.html" class="nav-dot"        aria-label="Record"></a>
      <a href="ar.html"      class="nav-dot"        aria-label="Archive"></a>
    </div>
  </nav>

  <script src="js/app.js"></script>
  <script src="js/swipe-nav.js"></script>
  <script>
  (function () {
    'use strict';

    var feed     = document.getElementById('community-feed');
    var emptyEl  = document.getElementById('community-empty');

    // ── Format date ───────────────────────────────────────────────────────
    function fmtDate(str) {
      if (!str) return '';
      var d = new Date(str);
      if (isNaN(d.getTime())) return str;
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
    }

    // ── Load contributions from localStorage ──────────────────────────────
    function loadContribs() {
      try { return JSON.parse(localStorage.getItem('cos_community') || '[]'); } catch (e) { return []; }
    }

    // ── Delete a contribution by id ───────────────────────────────────────
    function deleteContrib(id, cardEl) {
      var contribs = loadContribs();
      var updated  = contribs.filter(function (c) { return c.id !== id; });
      localStorage.setItem('cos_community', JSON.stringify(updated));
      if (cardEl && cardEl.parentNode) cardEl.parentNode.removeChild(cardEl);
      // Show empty state if no cards remain
      if (feed.children.length === 0) emptyEl.classList.add('visible');
    }

    // ── Build card ────────────────────────────────────────────────────────
    function buildCard(entry) {
      var card = document.createElement('div');
      card.className = 'contrib-card own-entry';

      // Image area
      var imgWrap = document.createElement('div');
      imgWrap.className = 'contrib-card-img';
      if (entry.image) {
        var imgEl = document.createElement('img');
        imgEl.src = entry.image;
        imgEl.alt = entry.prompt || '';
        imgEl.loading = 'lazy';
        imgWrap.appendChild(imgEl);
      }
      card.appendChild(imgWrap);

      // Body
      var body = document.createElement('div');
      body.className = 'contrib-card-body';

      if (entry.prompt) {
        var prompt = document.createElement('div');
        prompt.className = 'contrib-prompt';
        prompt.textContent = entry.prompt;
        body.appendChild(prompt);
      }

      if (entry.description) {
        var desc = document.createElement('div');
        desc.className = 'contrib-description';
        desc.textContent = entry.description;
        body.appendChild(desc);
      }

      var meta = document.createElement('div');
      meta.className = 'contrib-meta';

      var nick = document.createElement('div');
      nick.className = 'contrib-nickname';
      nick.textContent = entry.nickname || 'anonymous';
      meta.appendChild(nick);

      var right = document.createElement('div');
      right.style.cssText = 'display:flex;align-items:center;gap:8px;';

      var date = document.createElement('div');
      date.className = 'contrib-date';
      date.textContent = fmtDate(entry.created);
      right.appendChild(date);

      // Delete button
      var delBtn = document.createElement('button');
      delBtn.className = 'contrib-delete-btn';
      delBtn.textContent = 'delete';
      delBtn.setAttribute('aria-label', 'Delete this post');
      delBtn.addEventListener('click', function () {
        deleteContrib(entry.id, card);
      });
      right.appendChild(delBtn);

      meta.appendChild(right);
      body.appendChild(meta);
      card.appendChild(body);
      return card;
    }

    // ── Render feed ───────────────────────────────────────────────────────
    var contribs = loadContribs().slice().reverse();   // newest first

    if (contribs.length === 0) {
      emptyEl.classList.add('visible');
    } else {
      contribs.forEach(function (entry) {
        feed.appendChild(buildCard(entry));
      });
    }

  }());
  </script>
</body>
</html>
