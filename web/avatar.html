<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>Avatar — Contradiction of S</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Allow vertical scroll so Save Portrait / identity panel are reachable
       on small phones. Horizontal overflow stays hidden. */
    body { overflow-x: hidden; overflow-y: auto; }
    .page { padding-bottom: 0; }

    #avatar-stage-wrap {
      background:
        radial-gradient(circle at 18% 28%, rgba(92,26,26,0.03) 0%, transparent 55%),
        var(--bg);
    }
    /* Stage corner marks */
    #avatar-stage::before, #avatar-stage::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border: 1.5px dashed rgba(92,26,26,0.22);
      pointer-events: none;
    }
    #avatar-stage::before { top: -5px; left: -5px; border-right: none; border-bottom: none; }
    #avatar-stage::after  { bottom: -5px; right: -5px; border-left: none; border-top: none; }

    /* Background canvas — square artboard behind avatar stage */
    #bg-canvas {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      /* width/height set in JS to BG_SIZE × BG_SIZE (440×440) */
    }
    /* Stage must sit above the bg canvas */
    #avatar-stage {
      z-index: 1;
    }

    /* ── Custom icon images in toolbar ── */
    .tool-btn .custom-icon {
      width: 26px; height: 26px;
      object-fit: contain;
      mix-blend-mode: multiply;
      border-radius: 2px;
    }
    .tool-btn.active .custom-icon { filter: saturate(1.4); }

    /* ── Category tab icons ── */
    .cat-tab .tab-icon {
      width: 28px; height: 22px;
      object-fit: contain;
      mix-blend-mode: multiply;
      display: block;
      margin: 0 auto 1px;
    }
    .cat-tab {
      flex-direction: column;
      gap: 0;
      padding: 6px 10px 5px;
    }
    .cat-tab-label {
      font-size: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--warm-gray);
      transition: color 0.15s;
    }
    .cat-tab.active .cat-tab-label { color: var(--burgundy); }

    /* Layers + Background + Collection special tabs */
    .cat-tab-layers .tab-icon-svg,
    .cat-tab-bg .tab-icon-svg,
    .cat-tab-collection .tab-icon-svg {
      display: block;
      margin: 0 auto 1px;
      width: 20px; height: 20px;
      fill: var(--warm-gray);
      transition: fill 0.15s;
    }
    .cat-tab-layers.active .tab-icon-svg,
    .cat-tab-bg.active .tab-icon-svg,
    .cat-tab-collection.active .tab-icon-svg { fill: var(--burgundy); }

    /* ── My Collection tray ── */
    .collection-tray-empty {
      padding: 16px 14px;
      font-family: 'IM Fell English', serif;
      font-style: italic;
      color: var(--warm-gray);
      font-size: 12px;
      text-align: center;
      line-height: 1.6;
    }
    .collection-tray-empty a {
      color: var(--burgundy);
      text-decoration: none;
      display: block;
      margin-top: 6px;
    }
    .coll-thumb {
      /* override asset-thumb to allow label below the image */
      height: auto !important;
      padding: 0 !important;
      flex-direction: column !important;
      align-items: stretch !important;
      justify-content: flex-start !important;
      overflow: visible !important;
    }
    .coll-thumb img {
      width: 100% !important;
      height: auto !important;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      flex-shrink: 0;
    }
    .coll-thumb-label {
      font-family: 'IM Fell English', serif;
      font-size: 7px;
      font-style: italic;
      color: var(--warm-gray);
      padding: 2px 4px 3px;
      line-height: 1.3;
      word-break: break-word;
      hyphens: auto;
    }

    /* ── Layer panel ── */
    #layer-panel {
      display: none;
      flex-direction: column;
      gap: 3px;
      padding: 8px 12px 10px;
      max-height: 120px;
      overflow-y: auto;
      scrollbar-width: thin;
    }
    #layer-panel.visible { display: flex; }
    .lp-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      background: var(--bg);
      border: 1.5px solid rgba(92,26,26,0.12);
      border-radius: 3px;
      cursor: pointer;
      transition: border-color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .lp-item.lp-selected { border-color: var(--burgundy); background: rgba(92,26,26,0.05); }
    .lp-vis {
      width: 22px; height: 22px;
      border: none; background: none;
      font-size: 13px; line-height: 1;
      color: var(--burgundy);
      cursor: pointer; padding: 0;
      flex-shrink: 0;
    }
    .lp-vis.hidden { color: var(--muted); }
    .lp-name {
      flex: 1;
      font-size: 11px;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.06em;
      color: var(--ink);
    }
    .lp-order { display: flex; gap: 2px; }
    .lp-up, .lp-dn {
      width: 22px; height: 22px;
      border: 1px solid rgba(92,26,26,0.2);
      background: none;
      border-radius: 3px;
      font-size: 9px;
      color: var(--warm-gray);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .lp-up:hover, .lp-dn:hover { color: var(--burgundy); border-color: var(--burgundy); }
    .lp-empty {
      font-size: 11px; color: var(--muted);
      text-align: center; padding: 12px;
      font-style: italic; font-family: 'IM Fell English', serif;
    }

    /* ── Identity panel ── */
    .identity-wrap {
      flex-shrink: 0;
      border-top: 1px dashed rgba(92,26,26,0.15);
      background: var(--bg);
    }
    .identity-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .identity-toggle .toggle-label {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--warm-gray);
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .identity-preview {
      font-family: 'IM Fell English', serif;
      font-size: 13px;
      color: var(--burgundy);
      font-style: italic;
      flex: 1;
      text-align: center;
      padding: 0 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .identity-toggle .chevron {
      color: var(--muted);
      font-size: 10px;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .identity-toggle.open .chevron { transform: rotate(180deg); }
    #identity-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.28s ease;
    }
    #identity-panel.open { max-height: 230px; }

    .identity-pickers-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px 6px;
    }
    .picker-col {
      flex: 1;
      min-width: 0;
    }
    .picker-col-label {
      font-size: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--warm-gray);
      font-family: 'Space Grotesk', sans-serif;
      text-align: center;
      margin-bottom: 4px;
    }
    .picker-sep {
      font-family: 'IM Fell English', serif;
      font-size: 16px;
      color: var(--warm-gray);
      flex-shrink: 0;
      padding-top: 14px;
      opacity: 0.5;
    }
    .picker-wrap {
      position: relative;
      height: 105px;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 22%, black 78%, transparent 100%);
      mask-image: linear-gradient(to bottom, transparent 0%, black 22%, black 78%, transparent 100%);
    }
    .picker-sel-band {
      position: absolute;
      left: 4px; right: 4px;
      top: 35px;
      height: 35px;
      border-top: 1px solid rgba(92,26,26,0.15);
      border-bottom: 1px solid rgba(92,26,26,0.15);
      background: rgba(92,26,26,0.04);
      pointer-events: none;
      z-index: 2;
    }
    .picker-drum {
      position: relative;
      z-index: 1;
      height: 105px;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .picker-drum::-webkit-scrollbar { display: none; }
    .picker-pad { height: 35px; flex-shrink: 0; }
    .picker-item {
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: center;
      font-family: 'IM Fell English', serif;
      font-size: 12px;
      color: var(--warm-gray);
      cursor: pointer;
      user-select: none;
      transition: font-size 0.1s, color 0.1s, opacity 0.1s;
      opacity: 0.5;
    }
    .picker-item.is-near {
      font-size: 13px;
      opacity: 0.75;
      color: var(--ink);
    }
    .picker-item.is-selected {
      font-size: 16px;
      font-style: italic;
      color: var(--burgundy);
      opacity: 1;
    }
    .identity-result {
      text-align: center;
      padding: 2px 16px 12px;
      font-family: 'IM Fell English', serif;
      font-size: 18px;
      font-style: italic;
      color: var(--burgundy);
      min-height: 26px;
      letter-spacing: 0.02em;
    }

    /* ── Body type selector ── */
    #body-type-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px 5px;
      border-bottom: 1px solid rgba(92,26,26,0.1);
      flex-shrink: 0;
    }
    .btr-label {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--warm-gray);
      font-family: 'Space Grotesk', sans-serif;
      white-space: nowrap;
      margin-right: 2px;
    }
    .btr-btn {
      font-size: 9px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-family: 'Space Grotesk', sans-serif;
      padding: 3px 9px;
      border: 1px solid rgba(92,26,26,0.22);
      border-radius: 20px;
      background: none;
      color: var(--warm-gray);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .btr-btn.active {
      background: var(--burgundy);
      color: #fff;
      border-color: var(--burgundy);
    }
    .btr-btn.unavailable {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* ── Save portrait row ── */
    #save-portrait-row {
      padding: 8px 12px 9px;
      border-top: 1px dashed rgba(92,26,26,0.15);
      flex-shrink: 0;
    }
    #save-portrait-btn {
      width: 100%;
      padding: 9px 16px;
      background: var(--burgundy);
      color: #fff;
      border: none;
      border-radius: 3px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, opacity 0.15s;
    }
    #save-portrait-btn:disabled { opacity: 0.55; cursor: default; }
    #save-portrait-btn.saved    { background: var(--red); }

    /* ── Distort radius control ── */
    #distort-radius {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      background: rgba(92,26,26,0.2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    #distort-radius::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--burgundy);
      cursor: pointer;
    }
    .distort-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }
    .distort-row label {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--warm-gray);
      white-space: nowrap;
      font-family: 'Space Grotesk', sans-serif;
    }

    /* ── Background tab tray ── */
    .bg-tray {
      padding: 14px 16px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .bg-tray-note {
      font-family: 'IM Fell English', serif;
      font-size: 13px;
      font-style: italic;
      color: var(--warm-gray);
      line-height: 1.6;
      text-align: center;
    }


    /* ── Crop modal — dark cinema-style framing UI ── */
    #crop-modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #111;
      display: flex;
      flex-direction: column;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #crop-modal.open {
      opacity: 1;
      pointer-events: all;
    }
    .crop-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 10px;
      flex-shrink: 0;
      background: #111;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .crop-header-label {
      font-family: 'IM Fell English', serif;
      font-size: 16px;
      font-style: italic;
      color: #ddd;
    }
    .crop-zoom-btns {
      display: flex;
      gap: 6px;
    }
    .crop-zoom-btn {
      width: 34px; height: 34px;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 3px;
      background: none;
      font-size: 20px;
      line-height: 1;
      color: #ddd;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .crop-viewport {
      flex: 1;
      overflow: hidden;
      position: relative;
      touch-action: none;
      cursor: grab;
      background: #111;
    }
    .crop-viewport:active { cursor: grabbing; }
    #crop-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .crop-footer {
      display: flex;
      gap: 10px;
      padding: 10px 16px 12px;
      flex-shrink: 0;
      background: #111;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .crop-footer .btn { flex: 1; justify-content: center; }

    /* ── Theme: light accent colours need dark text on buttons ── */
    .theme-light #save-portrait-btn,
    .theme-light .btr-btn.active,
    .theme-light .btn.btn-primary { color: var(--ink); }

    /* ── Background artboard — subtle square boundary when bg tab is active ── */
    #bg-canvas.bg-active-mode {
      outline: 1px solid rgba(92,26,26,0.2);
      outline-offset: 0px;
    }

    /* ── Visual hierarchy: compact UI so avatar gets more screen ────────────
     * Reduce non-avatar chrome height by ~50px overall.
     * ─────────────────────────────────────────────────────────────────────── */

    /* Slimmer body-type row */
    #body-type-row {
      padding: 3px 12px 3px !important;
    }
    .btr-btn {
      padding: 2px 7px !important;
      font-size: 8px !important;
    }

    /* Slimmer save-portrait row */
    #save-portrait-row {
      padding: 5px 12px 6px !important;
    }
    #save-portrait-btn {
      padding: 7px 16px !important;
      font-size: 10px !important;
    }

    /* Identity toggle — very minimal when collapsed */
    .identity-toggle {
      padding: 5px 12px !important;
    }
    .identity-preview {
      font-size: 11px !important;
    }
    .toggle-label {
      font-size: 8px !important;
    }

    /* Picker items — less dominant */
    .picker-item         { font-size: 11px !important; opacity: 0.45; }
    .picker-item.is-near { font-size: 12px !important; opacity: 0.7; }
    .picker-item.is-selected { font-size: 14px !important; opacity: 1; }
    .identity-result {
      font-size: 15px !important;
      padding: 0 16px 8px !important;
    }
    .picker-wrap { height: 90px !important; }
    .picker-drum { height: 90px !important; }

    /* Draw controls bar — tighter */
    .draw-controls { padding: 4px 10px !important; gap: 6px !important; }

    /* Distort controls — inline layout only when visible */
    #distort-controls.visible {
      display: flex !important;
      align-items: center;
      gap: 8px;
    }
    #distort-controls .distort-row { flex: 1; }
  </style>
</head>
<body>
  <div class="page">
    <div class="avatar-creator">

      <!-- ── Toolbar ── -->
      <div class="avatar-toolbar">

        <button class="tool-btn active" id="tool-select" title="Select / move / resize / rotate">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M4 0l16 12-7 2-4 8L4 0z"/></svg>
          Move
        </button>

        <button class="tool-btn" id="tool-draw" title="Draw with red pen">
          <img class="custom-icon" src="icons/DrawBrush.jpeg" alt="Draw">
          Draw
        </button>

        <button class="tool-btn" id="tool-distort" title="Drag to warp figure">
          <img class="custom-icon" src="icons/DistortBrush.jpeg" alt="Distort">
          Distort
        </button>

        <button class="tool-btn" id="tool-remove" title="Remove selected layer">
          <img class="custom-icon" src="icons/Remove.jpeg" alt="Remove">
          Remove
        </button>

        <button class="tool-btn" id="tool-clear-draw" title="Clear all — reset to blank body">
          <img class="custom-icon" src="icons/Clear.jpeg" alt="Clear">
          Clear all
        </button>

        <button class="tool-btn" id="tool-undo" title="Undo (Ctrl+Z)" disabled>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12.5 8c-2.65 0-5.05 1-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
          Undo
        </button>

        <button class="tool-btn" id="tool-redo" title="Redo (Ctrl+Shift+Z)" disabled>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M18.4 10.6C16.55 9 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg>
          Redo
        </button>

      </div>

      <!-- ── Stage ── -->
      <div id="avatar-stage-wrap">
        <!-- bg-canvas: 1024×1024 square composition canvas (BG_SIZE px).
             CSS size set dynamically by fitBgCanvas() = min(wrapW, wrapH).
             In background tab the avatar stage is zoomed to scale(0.5) so the
             user can see and draw in the full composition space around it. -->
        <canvas id="bg-canvas"></canvas>
        <div id="avatar-stage">
          <canvas id="drawing-canvas"></canvas>
          <canvas id="distort-cursor"></canvas>
        </div>
      </div>

      <!-- ── Asset panel ── -->
      <div class="asset-panel">

        <!-- Category tabs -->
        <div class="cat-tabs" role="tablist">

          <button class="cat-tab active" data-cat="body" role="tab">
            <img class="tab-icon" src="icons/Body.jpeg" alt="">
            <span class="cat-tab-label">Body</span>
          </button>

          <button class="cat-tab cat-tab-collection" data-cat="collection" role="tab" title="My sticker collection">
            <svg class="tab-icon-svg" viewBox="0 0 24 24">
              <path d="M12 2l2.47 7.6H22l-6.47 4.7 2.47 7.6L12 17.2l-6 4.7 2.47-7.6L2 9.6h7.53z"/>
            </svg>
            <span class="cat-tab-label">Stickers</span>
          </button>

          <button class="cat-tab" data-cat="face" role="tab">
            <img class="tab-icon" src="icons/Face.jpeg" alt="">
            <span class="cat-tab-label">Face</span>
          </button>

          <button class="cat-tab" data-cat="hair-top" role="tab">
            <img class="tab-icon" src="icons/HairTop.jpeg" alt="">
            <span class="cat-tab-label">Hair top</span>
          </button>

          <button class="cat-tab" data-cat="hair-bottom" role="tab">
            <img class="tab-icon" src="icons/HairLow.jpeg" alt="">
            <span class="cat-tab-label">Hair low</span>
          </button>

          <button class="cat-tab" data-cat="tops" role="tab">
            <img class="tab-icon" src="icons/Clothes.jpeg" alt="">
            <span class="cat-tab-label">Tops</span>
          </button>

          <button class="cat-tab" data-cat="bottoms" role="tab">
            <img class="tab-icon" src="icons/Clothes.jpeg" alt="">
            <span class="cat-tab-label">Bottoms</span>
          </button>

          <button class="cat-tab cat-tab-bg" data-cat="background" role="tab" title="Draw background">
            <svg class="tab-icon-svg" viewBox="0 0 24 24">
              <path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14z"/>
              <path d="M6.5 16l3-4 2.5 3 2-2.5 3 3.5z" opacity="0.45"/>
            </svg>
            <span class="cat-tab-label">Bg</span>
          </button>

          <button class="cat-tab cat-tab-layers" data-cat="__layers" role="tab" title="Layer order &amp; visibility">
            <svg class="tab-icon-svg" viewBox="0 0 24 24"><path d="M11.99 18.54l-7.37-5.73L3 14.07l9 7 9-7-1.63-1.27-7.38 5.74zm.01-2.54l7.36-5.73L21 8.93 12 2 3 8.93l1.63 1.34L12 16z"/></svg>
            <span class="cat-tab-label">Layers</span>
          </button>

        </div>

        <!-- Draw controls (shown only when draw tool active) -->
        <div class="draw-controls" id="draw-controls">
          <span style="font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--warm-gray); white-space:nowrap; font-family:'Space Grotesk',sans-serif;">Size</span>
          <button class="brush-btn brush-size-btn" data-size="2"><div class="brush-dot" style="width:4px;height:4px;background:#B31A1A;border-radius:50%;"></div></button>
          <button class="brush-btn brush-size-btn active" data-size="4"><div class="brush-dot" style="width:8px;height:8px;background:#B31A1A;border-radius:50%;"></div></button>
          <button class="brush-btn brush-size-btn" data-size="8"><div class="brush-dot" style="width:13px;height:13px;background:#B31A1A;border-radius:50%;"></div></button>
          <span style="font-family:'IM Fell English',serif; font-size:11px; color:var(--warm-gray); font-style:italic; padding-left:4px;">red pen only</span>
        </div>

        <!-- Distort controls (shown only when distort tool active) -->
        <div class="draw-controls" id="distort-controls">
          <div class="distort-row">
            <label for="distort-radius">Reach</label>
            <input type="range" id="distort-radius" min="0.06" max="0.45" step="0.01" value="0.15">
          </div>
          <button class="btn btn-ghost btn-sm" id="distort-reset-btn" style="flex-shrink:0; font-size:9px; padding:3px 8px; white-space:nowrap;">Reset warp</button>
        </div>

        <!-- Asset thumbnails -->
        <div class="asset-tray" id="asset-tray"></div>

        <!-- Layer panel (shown when Layers tab active) -->
        <div id="layer-panel"></div>

      </div>

      <!-- ── Save portrait ── -->
      <div id="save-portrait-row">
        <button id="save-portrait-btn">Save portrait</button>
      </div>

      <!-- ── Identity panel ── -->
      <div class="identity-wrap" id="identity-wrap">
        <button class="identity-toggle" id="identity-toggle">
          <span class="toggle-label">Identity</span>
          <span class="identity-preview" id="identity-preview">— scroll to choose —</span>
          <span class="chevron">▾</span>
        </button>
        <div id="identity-panel">
          <div class="identity-pickers-row">
            <div class="picker-col">
              <div class="picker-col-label">Colour of Condition</div>
              <div class="picker-wrap">
                <div class="picker-sel-band"></div>
                <div class="picker-drum" id="colour-drum"></div>
              </div>
            </div>
            <div class="picker-sep">+</div>
            <div class="picker-col">
              <div class="picker-col-label">Shape of Condition</div>
              <div class="picker-wrap">
                <div class="picker-sel-band"></div>
                <div class="picker-drum" id="shape-drum"></div>
              </div>
            </div>
          </div>
          <div class="identity-result" id="identity-result">—</div>
        </div>
      </div>

    </div><!-- /.avatar-creator -->
  </div>

  <nav class="bottom-nav" aria-label="Main navigation">
    <span class="nav-d-label">Home</span>
    <div class="nav-d-dots">
      <a href="index.html"   class="nav-dot"        aria-label="Home"></a>
      <a href="gesture.html" class="nav-dot"        aria-label="Record"></a>
      <a href="ar.html"      class="nav-dot"        aria-label="Archive"></a>
    </div>
  </nav>

  <!-- ── Crop modal (outside .page, fixed overlay) ── -->
  <div id="crop-modal" aria-hidden="true">
    <div class="crop-header">
      <span class="crop-header-label">Frame your portrait</span>
      <div class="crop-zoom-btns">
        <button class="crop-zoom-btn" id="crop-zoom-out">−</button>
        <button class="crop-zoom-btn" id="crop-zoom-in">+</button>
      </div>
    </div>
    <div class="crop-viewport" id="crop-viewport">
      <canvas id="crop-canvas"></canvas>
    </div>
    <div class="crop-footer">
      <button class="btn btn-ghost btn-sm" id="crop-cancel">Retake</button>
      <button class="btn btn-primary btn-sm" id="crop-confirm">Confirm portrait</button>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/avatar.js"></script>
</body>
</html>
