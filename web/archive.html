<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>Archive — Contradiction of S</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { overflow: hidden; }
    .page { padding-bottom: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div class="page">

    <!-- Current prompt (sticky header) -->
    <div class="archive-header">
      <div class="prompt-card">
        <div class="prompt-label">
          <svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle; margin-right:4px; opacity:0.7;"><path d="M12 2l2.2 6.6H21l-5.6 4 2.2 6.6L12 15.2 6.4 19.2l2.2-6.6L3 8.6h6.8z"/></svg>
          Current prompt
        </div>
        <div class="prompt-text" id="current-prompt-text">Loading…</div>
        <div class="prompt-timer" id="prompt-timer"></div>
      </div>
    </div>

    <!-- Archive layout fills remaining height -->
    <div class="archive-layout" style="flex:1; min-height:0;">
      <!-- Feed (column-reverse so new entries appear at bottom) -->
      <div class="archive-feed" id="archive-feed"></div>

      <!-- Compose bar -->
      <div class="archive-compose">
        <textarea
          class="compose-input"
          id="compose-input"
          placeholder="Write something…"
          rows="1"
          aria-label="Your response"
        ></textarea>
        <button class="compose-send" id="send-btn" aria-label="Send">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

  </div>

  <nav class="bottom-nav">
    <a href="index.html"   class="nav-item"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home</a>
    <a href="profile.html" class="nav-item"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>Profile</a>
    <a href="avatar.html"  class="nav-item"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a5 5 0 110 10A5 5 0 0112 2zm0 12c5.3 0 8 2.7 8 4v2H4v-2c0-1.3 2.7-4 8-4z"/></svg>Avatar</a>
    <a href="archive.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>Archive</a>
  </nav>

  <script src="js/app.js"></script>
  <script src="js/archive.js"></script>
</body>
</html>
