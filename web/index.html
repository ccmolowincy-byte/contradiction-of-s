<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>Contradiction of S</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Immersive homepage — no scroll ──────────────────────────────────────── */
    body { overflow: hidden; }

    /* Stage fills the screen above the fixed bottom nav */
    #home-stage {
      position: fixed;
      top: 0; left: 0; right: 0;
      bottom: var(--nav-h);
      background: var(--bg);
      overflow: hidden;
    }

    /* ── Star sticker layer ───────────────────────────────────────────────── */
    #star-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .star-sticker {
      position: absolute;
      pointer-events: none;
      user-select: none;
    }

    /* ── Three.js canvas — transparent so warm bg shows through ─────────── */
    #title-canvas {
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      z-index: 2;
    }

    /* ── Loading indicator ────────────────────────────────────────────────── */
    #model-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
      opacity: 1;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }
    #model-loading.hidden { opacity: 0; }
    .loading-dots { display: flex; gap: 8px; }
    .loading-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--burgundy);
      animation: ldPulse 1.4s ease-in-out infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes ldPulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%            { opacity: 0.65; transform: scale(1.1); }
    }

    /* ── CTA overlay — fades up from bottom of stage ──────────────────────── */
    #home-cta {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 32px 32px;
      gap: 11px;
      z-index: 10;
      background: linear-gradient(to top, var(--bg) 38%, transparent 100%);
    }
    .enter-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 36px;
      background: var(--burgundy);
      color: #f5ede0;
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 15px;
      font-style: italic;
      letter-spacing: 0.09em;
      text-decoration: none;
      border-radius: 2px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .enter-btn:active { background: var(--red); }
    .enter-btn-icon {
      width: 14px; height: 14px;
      border: 1.5px solid currentColor;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .enter-btn-icon::after {
      content: '';
      display: block;
      width: 0; height: 0;
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
      border-left: 6px solid currentColor;
      margin-left: 1px;
    }
    .avatar-cta-link {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 12px;
      font-style: italic;
      color: var(--warm-gray);
      letter-spacing: 0.06em;
      text-decoration: none;
      opacity: 0.75;
      transition: opacity 0.15s;
    }
    .avatar-cta-link:active { opacity: 1; }
  </style>
</head>
<body>

  <!-- ── Immersive stage ─────────────────────────────────────────────────── -->
  <div id="home-stage">

    <!-- Hand-drawn star stickers — scattered across the composition -->
    <div id="star-layer" aria-hidden="true"></div>

    <!-- Three.js canvas for the floating 3D title model -->
    <canvas id="title-canvas"></canvas>

    <!-- Loading pulse while GLB downloads -->
    <div id="model-loading" role="status" aria-label="Loading">
      <div class="loading-dots">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
      </div>
    </div>

    <!-- Entry points -->
    <div id="home-cta">
      <a href="../contradiction-of-s-ar/index.html" class="enter-btn">
        <span class="enter-btn-icon" aria-hidden="true"></span>
        Enter Experience
      </a>
      <a href="avatar.html" class="avatar-cta-link">build your avatar →</a>
    </div>

  </div>

  <!-- ── Bottom navigation ──────────────────────────────────────────────── -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <a href="index.html"   class="nav-item active" aria-label="Home">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Home
    </a>
    <a href="profile.html" class="nav-item" aria-label="Profile">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
      Profile
    </a>
    <a href="avatar.html"  class="nav-item" aria-label="Avatar">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a5 5 0 110 10A5 5 0 0112 2zm0 12c5.3 0 8 2.7 8 4v2H4v-2c0-1.3 2.7-4 8-4z"/></svg>
      Avatar
    </a>
    <a href="archive.html" class="nav-item" aria-label="Archive">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
      Archive
    </a>
  </nav>

  <!-- ── Star sticker placement ────────────────────────────────────────────── -->
  <script>
    /* Hardcoded positions for a balanced, non-random composition.
     * { f: filename, x: left%, y: top%, w: width in vw, r: rotation deg, o: opacity }
     * Kept away from the vertical centre so they frame the 3D title, not obscure it. */
    const STARS = [
      { f: 'star1', x:  5, y:  6, w: 28, r: -13, o: 0.55 }, // top-left,  large
      { f: 'star3', x: 71, y:  4, w: 18, r:  24, o: 0.50 }, // top-right
      { f: 'star2', x: 83, y: 44, w: 15, r:  -7, o: 0.58 }, // right side
      { f: 'star5', x:  2, y: 58, w: 20, r:  31, o: 0.48 }, // left lower
      { f: 'star4', x: 57, y: 78, w: 16, r: -19, o: 0.42 }, // bottom centre
    ];
    const layer = document.getElementById('star-layer');
    STARS.forEach(s => {
      const img = document.createElement('img');
      img.className  = 'star-sticker';
      img.src        = `assets/stars/${s.f}.png`;
      img.alt        = '';
      img.loading    = 'lazy';
      img.style.left     = s.x + '%';
      img.style.top      = s.y + '%';
      img.style.width    = s.w + 'vw';
      img.style.maxWidth = '170px';
      img.style.opacity  = s.o;
      img.style.transform = `rotate(${s.r}deg)`;
      layer.appendChild(img);
    });
  </script>

  <!-- ── Three.js 3D title model ──────────────────────────────────────────── -->
  <script type="importmap">
    {
      "imports": {
        "three":          "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE       from 'three';
    import { GLTFLoader }   from 'three/addons/loaders/GLTFLoader.js';

    const canvas     = document.getElementById('title-canvas');
    const loadingEl  = document.getElementById('model-loading');
    const stage      = document.getElementById('home-stage');

    /* ── Renderer ──────────────────────────────────────────────────────────── */
    const renderer = new THREE.WebGLRenderer({
      canvas,
      alpha:           true,   // transparent: warm bg colour shows through
      antialias:       true,
      powerPreference: 'default',
    });
    renderer.setClearColor(0x000000, 0);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace  = THREE.SRGBColorSpace;
    renderer.toneMapping       = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;

    /* ── Scene & camera ────────────────────────────────────────────────────── */
    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(40, 1, 0.01, 200);
    camera.position.set(0, 0, 9);

    /* ── Lighting — warm, sculptural, gentle ──────────────────────────────── */
    scene.add(new THREE.AmbientLight(0xfff6e8, 0.85));

    const keyLight = new THREE.DirectionalLight(0xffeedd, 1.5);
    keyLight.position.set(3, 4, 4);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xd8e4ff, 0.3);
    fillLight.position.set(-3, -1, 2);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0xffddb8, 0.45);
    rimLight.position.set(-1, 3, -4);
    scene.add(rimLight);

    /* ── Model fit — reusable, always uses current camera.aspect ─────────── */
    let model    = null;
    let basePos  = new THREE.Vector3();
    let modelBox = null;   // cached un-scaled bounding box (before fitModel scales it)

    function fitModel() {
      if (!model || !modelBox) return;
      const size   = modelBox.getSize(new THREE.Vector3());
      const centre = modelBox.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);

      const fovRad   = THREE.MathUtils.degToRad(camera.fov);
      const dist     = camera.position.z;
      const visH     = 2 * Math.tan(fovRad / 2) * dist;
      const visW     = visH * camera.aspect;   // uses live camera.aspect
      // Fill 72% of the shorter viewport dimension (portrait → width)
      const fitScale = (Math.min(visW, visH) * 0.72) / maxDim;

      model.scale.setScalar(fitScale);
      model.position.set(
        -centre.x * fitScale,
        -centre.y * fitScale + 0.14,  // nudge up slightly to clear CTAs
        -centre.z * fitScale
      );
      basePos.copy(model.position);
    }

    /* ── Load GLB ─────────────────────────────────────────────────────────── */
    const loader = new GLTFLoader();
    loader.load(
      'assets/title.glb',
      gltf => {
        model = gltf.scene;
        // Build bounding box from mesh geometry only (skip cameras/empties from FBX import)
        modelBox = new THREE.Box3();
        model.traverse(child => { if (child.isMesh) modelBox.expandByObject(child); });
        if (modelBox.isEmpty()) modelBox.setFromObject(model); // fallback
        scene.add(model);
        fitModel();              // fit using the already-correct camera.aspect
        loadingEl.classList.add('hidden');
        animate();
      },
      undefined,
      err => {
        console.warn('GLB load failed:', err);
        loadingEl.classList.add('hidden');
      }
    );

    /* ── Animation — dreamlike float, slow rotation, gentle sway ─────────── */
    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += 0.007;                                    // ~0.007 rad per frame at 60fps

      if (model) {
        // Slow Y-axis rotation — one full turn every ~15 minutes
        model.rotation.y  = t * 0.15;

        // Gentle float — sine period ~9 seconds
        model.position.y  = basePos.y + Math.sin(t * 0.45) * 0.22;

        // Subtle horizontal drift — barely perceptible
        model.position.x  = basePos.x + Math.sin(t * 0.27) * 0.06;

        // Dreamy tilt sway — period ~11 seconds, ±1.5 degrees
        model.rotation.z  = Math.sin(t * 0.36) * 0.026;
      }

      renderer.render(scene, camera);
    }

    /* ── Resize — update camera + refit model ─────────────────────────────── */
    function onResize() {
      const w = stage.clientWidth;
      const h = stage.clientHeight;
      if (!w || !h) return;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      fitModel();   // refit whenever viewport changes
    }
    window.addEventListener('resize', () => requestAnimationFrame(onResize));
    // Run immediately (synchronous) so camera.aspect is correct before GLB loads
    onResize();
  </script>

  <script src="js/app.js"></script>
</body>
</html>
