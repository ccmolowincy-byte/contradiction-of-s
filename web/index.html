<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>Contradiction of S</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet">

  <link rel="preload" href="assets/home/home-screen-intro.jpg" as="image">
  <link rel="stylesheet" href="style.css">
  <style>
    body { overflow: hidden; }

    /* ── Intro overlay ── */
    #intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
    }
    #intro-dark {
      position: absolute;
      inset: 0;
      background: #0D0908;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(32px,8vw,60px) clamp(24px,6vw,48px);
    }
    .intro-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(13px,3.8vw,18px);
      color: rgba(240,234,224,0.80);
      line-height: 1.75;
      text-align: center;
      max-width: 320px;
    }
    #intro-parch {
      position: absolute;
      inset: 0;
      background: #F0EAE0;
      opacity: 0;
    }
    #intro-draw {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 65%;
      opacity: 0;
    }
    #intro-draw img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 38%;
      mix-blend-mode: multiply;
      display: block;
    }
    #intro-title {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: max(56px,14vh);
      text-align: center;
      opacity: 0;
    }
    .intro-tm {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(18px,5.5vw,32px);
      color: #1C0E0A;
      line-height: 1.3;
      letter-spacing: 0.02em;
    }
    .intro-ts {
      display: block;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(10px,2.8vw,16px);
      color: #5C1A1A;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-top: 6px;
    }
    #intro-tap {
      position: absolute;
      bottom: max(28px,7vh);
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: clamp(13px,3.8vw,19px);
      color: #5C1A1A;
      letter-spacing: 0.1em;
      border: 0.5px solid #8B2525;
      padding: clamp(8px,2vh,12px) clamp(20px,6vw,32px);
      background: transparent;
      cursor: pointer;
      opacity: 0;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    @media (prefers-reduced-motion: reduce) {
      #intro-overlay { display: none; }
    }

    #home-stage {
      position: fixed;
      top: 0; left: 0; right: 0;
      bottom: var(--nav-h, 44px);
      background: var(--bg);
      overflow: hidden;
    }

    .variation { position: absolute; inset: 0; display: none; }
    .variation.active { display: block; }

    /* ── Figure zone — top 69% ── */
    .v-figure-zone {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 69%;
      overflow: hidden;
    }
    .v-fig {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      object-position: center bottom;
      display: block;
      pointer-events: none;
    }

    /* ── Stars in figure zone ── */
    .v-star {
      position: absolute;
      pointer-events: none;
      user-select: none;
      z-index: 5;
    }
    .v-star img {
      width: 100%; height: auto; display: block;
      mix-blend-mode: multiply;
      animation: vstar-bob 7s ease-in-out infinite;
    }
    @keyframes vstar-bob {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }
    .v-star:nth-child(2) img { animation-delay: -2.3s; }
    .v-star:nth-child(3) img { animation-delay: -4.7s; }
    .v-star:nth-child(4) img { animation-delay: -1.5s; }

    /* ── Caption strip — bottom 31% ── */
    .v-caption-strip {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 31%;
      background: #EDE5D6;
      border-top: 1px solid rgba(137,24,24,.28);
      display: flex;
      align-items: stretch;
      padding: clamp(4px,1.8vw,12px) clamp(6px,2.5vw,16px);
      gap: clamp(4px,1.5vw,10px);
      z-index: 10;
    }
    .v-caption-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }
    .v-caption-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: space-between;
      flex-shrink: 0;
      padding: clamp(2px,1vw,6px) 0;
    }

    /* ── Title ── */
    .v-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      color: #891818;
      pointer-events: none;
      user-select: none;
    }
    .v-ta { display: block; font-size: clamp(10px, 3.8vw, 18px); line-height: 1.2; white-space: nowrap; overflow: hidden; }
    .v-ts { display: block; font-size: clamp(30px, 15vw, 68px); line-height: .82; letter-spacing: 0.01em; }

    /* ── Stars in caption strip ── */
    .v-star-caption {
      pointer-events: none;
      width: clamp(16px, 5.5vw, 28px);
      flex-shrink: 0;
    }
    .v-star-caption img { width: 100%; height: auto; display: block; mix-blend-mode: multiply; }

    /* ── Enter button ── */
    .v-enter {
      display: block;
      width: clamp(50px, 22vw, 90px);
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .v-enter img { width: 100%; height: auto; display: block; mix-blend-mode: multiply; }

    /* ── Landscape overrides ── */
    @media (orientation: landscape) {
      .v-figure-zone { height: 52%; }
      .v-caption-strip { height: 48%; }
      .v-ta { font-size: min(3.6vw, 4vh); }
      .v-ts { font-size: min(13vw, 11.5vh); }
      .v-enter { width: min(20vw, 80px); }
    }
  </style>
</head>
<body>

  <div id="home-stage">

    <!-- ── Variation 1 ── -->
    <div class="variation" id="v1">
      <div class="v-figure-zone">
        <img class="v-fig" src="assets/home/figure1.png" alt="">
        <div class="v-star" style="left:0%;  top:4px;  width:11%; transform:rotate(-12deg);">
          <img src="assets/stars/star2.png" alt="">
        </div>
        <div class="v-star" style="right:0%; top:4px;  width:9%;  transform:rotate(22deg);">
          <img src="assets/stars/star3.png" alt="">
        </div>
        <div class="v-star" style="left:-1%; top:42%; width:12%; transform:rotate(-5deg);">
          <img src="assets/stars/star1.png" alt="">
        </div>
        <div class="v-star" style="right:-1%;top:38%; width:10%; transform:rotate(34deg);">
          <img src="assets/stars/star5.png" alt="">
        </div>
      </div>
    </div>

    <!-- ── Variation 2 ── -->
    <div class="variation" id="v2">
      <div class="v-figure-zone">
        <img class="v-fig" src="assets/home/figure2.png" alt="">
        <div class="v-star" style="left:0%;  top:4px;  width:9%;  transform:rotate(-35deg);">
          <img src="assets/stars/star2.png" alt="">
        </div>
        <div class="v-star" style="right:1%; top:4px;  width:8%;  transform:rotate(15deg);">
          <img src="assets/stars/star4.png" alt="">
        </div>
        <div class="v-star" style="left:-2%; top:45%; width:13%; transform:rotate(28deg);">
          <img src="assets/stars/star5.png" alt="">
        </div>
        <div class="v-star" style="right:0%; top:40%; width:10%; transform:rotate(-20deg);">
          <img src="assets/stars/star1.png" alt="">
        </div>
      </div>
    </div>

    <!-- ── Variation 3 ── -->
    <div class="variation" id="v3">
      <div class="v-figure-zone">
        <img class="v-fig" src="assets/home/figure3.png" alt="">
        <div class="v-star" style="left:0%;  top:4px;  width:10%; transform:rotate(8deg);">
          <img src="assets/stars/star4.png" alt="">
        </div>
        <div class="v-star" style="right:0%; top:4px;  width:11%; transform:rotate(14deg);">
          <img src="assets/stars/star3.png" alt="">
        </div>
        <div class="v-star" style="right:-1%;top:42%; width:12%; transform:rotate(-45deg);">
          <img src="assets/stars/star1.png" alt="">
        </div>
        <div class="v-star" style="left:-1%; top:48%; width:9%;  transform:rotate(20deg);">
          <img src="assets/stars/star2.png" alt="">
        </div>
      </div>
    </div>

    <!-- ── Variation 4 ── -->
    <div class="variation" id="v4">
      <div class="v-figure-zone">
        <img class="v-fig" src="assets/home/figure4.png" alt="">
        <div class="v-star" style="left:0%;  top:4px;  width:10%; transform:rotate(20deg);">
          <img src="assets/stars/star4.png" alt="">
        </div>
        <div class="v-star" style="right:1%; top:4px;  width:9%;  transform:rotate(-8deg);">
          <img src="assets/stars/star5.png" alt="">
        </div>
        <div class="v-star" style="left:-1%; top:44%; width:11%; transform:rotate(-15deg);">
          <img src="assets/stars/star5.png" alt="">
        </div>
        <div class="v-star" style="right:0%; top:40%; width:11%; transform:rotate(10deg);">
          <img src="assets/stars/star1.png" alt="">
        </div>
      </div>
    </div>

    <!-- ── Variation 5 ── -->
    <div class="variation" id="v5">
      <div class="v-figure-zone">
        <img class="v-fig" src="assets/home/figure5.png" alt="">
        <div class="v-star" style="left:-2%; top:4px;  width:12%; transform:rotate(-5deg);">
          <img src="assets/stars/star1.png" alt="">
        </div>
        <div class="v-star" style="right:1%; top:4px;  width:8%;  transform:rotate(10deg);">
          <img src="assets/stars/star5.png" alt="">
        </div>
        <div class="v-star" style="left:-1%; top:46%; width:13%; transform:rotate(22deg);">
          <img src="assets/stars/star2.png" alt="">
        </div>
        <div class="v-star" style="right:2%; top:40%; width:11%; transform:rotate(-8deg);">
          <img src="assets/stars/star3.png" alt="">
        </div>
      </div>
    </div>

    <!-- ── Caption strip — same for all variations ── -->
    <div class="v-caption-strip">
      <div class="v-caption-left">
        <div class="v-title">
          <span class="v-ta">The Contradiction of</span>
          <span class="v-ts">S</span>
        </div>
      </div>
      <div class="v-caption-right">
        <div class="v-star-caption" style="transform:rotate(-14deg);">
          <img src="assets/stars/star1.png" alt="">
        </div>
        <div class="v-star-caption" style="transform:rotate(20deg);">
          <img src="assets/stars/star4.png" alt="">
        </div>
        <a class="v-enter" href="gesture.html" data-exit-delay="420">
          <img src="assets/home/enter.png" alt="Enter">
        </a>
      </div>
    </div>

  </div><!-- /#home-stage -->

  <!-- ── Intro overlay ── -->
  <div id="intro-overlay">
    <div id="intro-dark">
      <p class="intro-text">In 2023, I was diagnosed with scoliosis. This archive holds traces of the repetitive exercises I was prescribed to negotiate the pain.</p>
    </div>
    <div id="intro-parch">
      <div id="intro-draw">
        <img src="assets/home/home-screen-intro.jpg" alt="" decoding="async">
      </div>
      <div id="intro-title">
        <span class="intro-tm">The Contradiction of S</span>
        <span class="intro-ts">AR Archive</span>
      </div>
      <button id="intro-tap">tap to begin</button>
    </div>
  </div>

  <!-- ── Navigation ── -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <span class="nav-d-label">Home</span>
    <div class="nav-d-dots">
      <a href="index.html"   class="nav-dot active" aria-label="Home"></a>
      <a href="gesture.html" class="nav-dot"        aria-label="Record"></a>
      <a href="ar.html"      class="nav-dot"        aria-label="Archive"></a>
    </div>
  </nav>


  <script>
    (function () {
      var overlay = document.getElementById('intro-overlay');
      var dark    = document.getElementById('intro-dark');
      var parch   = document.getElementById('intro-parch');
      var draw    = document.getElementById('intro-draw');
      var title   = document.getElementById('intro-title');
      var tap     = document.getElementById('intro-tap');

      function fd(el, to, dur, del) {
        setTimeout(function () {
          el.style.transition = 'opacity ' + dur + 's ease-out';
          el.style.opacity    = String(to);
        }, del * 1000);
      }

      // Variant A: dark fades → parchment + title rise → drawing blooms → tap appears
      fd(dark,  0, 2.0, 0.1);
      fd(parch, 1, 2.0, 0.5);
      fd(title, 1, 2.0, 0.8);
      fd(draw,  1, 2.5, 3.2);
      fd(tap,   1, 1.2, 6.0);

      // Failsafe: never leave visitors stuck on a dark screen
      var failsafe = setTimeout(function () {
        overlay.style.display = 'none';
      }, 15000);

      tap.addEventListener('click', function () {
        clearTimeout(failsafe);
        tap.style.pointerEvents = 'none';
        // Fade parchment layers out, dark back in → clean fade-to-black
        [parch, draw, title, tap].forEach(function (el) {
          el.style.transition = 'opacity 0.7s ease-out';
          el.style.opacity = '0';
        });
        dark.style.transition = 'opacity 0.7s ease-out';
        dark.style.opacity = '1';
        setTimeout(function () {
          window.location.href = 'gesture.html';
        }, 800);
      });
    }());
  </script>

  <script>
    var key  = 'home-var';
    var next = (parseInt(localStorage.getItem(key) || '0') % 5) + 1;
    localStorage.setItem(key, next);
    document.getElementById('v' + next).classList.add('active');

    // Enter button exit animation
    document.querySelectorAll('.v-enter').forEach(function(a) {
      a.dataset.exitDelay = '420';
    });

    // Star scatter on exit — animates both figure-zone and caption-strip stars
    document.addEventListener('page-exit', function(e) {
      if (!e.detail.trigger.classList.contains('v-enter')) return;
      var stars = Array.from(
        document.querySelectorAll('.variation.active .v-star, .v-star-caption')
      );
      stars.forEach(function(star, i) {
        var dir = (i % 2 === 0 ? 1 : -1);
        star.style.transition = 'transform 0.4s ease-out, opacity 0.35s ease';
        star.style.transform  = 'translateY(-55px) scale(1.25) rotate(' + (dir * 28) + 'deg)';
        star.style.opacity    = '0';
      });
    });
  </script>

  <script src="js/app.js"></script>
  <script src="js/transitions.js"></script>
  <script src="js/swipe-nav.js"></script>
</body>
</html>
