<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>Contradiction of S</title>

  <!-- Calligraphic title font — closest web match to the handwritten examples -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <style>
    body { overflow: hidden; }

    #home-stage {
      position: fixed;
      top: 0; left: 0; right: 0;
      bottom: var(--nav-h, 60px);
      background: var(--bg);
      overflow: hidden;
    }

    /* Only one variation shown at a time */
    .variation {
      position: absolute;
      inset: 0;
      display: none;
    }
    .variation.active { display: block; }

    /* Figure PNG — black in PNG blends with black stage background */
    .v-fig {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      height: auto;
      display: block;
      pointer-events: none;
    }

    /* Handwritten title — Pinyon Script, dark crimson */
    .v-title {
      position: absolute;
      font-family: 'Pinyon Script', Georgia, cursive;
      color: #891818;
      line-height: 1.08;
      pointer-events: none;
      user-select: none;
    }
    .v-t1 { display: block; font-size: 7.5vw; }
    .v-t2 { display: block; font-size: 11vw; }
    .v-t3 { display: block; font-size: 13.5vw; }

    /* Enter button — dark red star PNG, fully tappable */
    .v-enter {
      position: absolute;
      display: block;
      -webkit-tap-highlight-color: transparent;
    }
    .v-enter img {
      width: 100%;
      height: auto;
      display: block;
      mix-blend-mode: multiply;
    }

    /* Hand-drawn star stickers */
    .v-star {
      position: absolute;
      pointer-events: none;
      user-select: none;
    }
    .v-star img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>

  <div id="home-stage">

    <!-- ── Variation 1 ── three-figure group, lower centre ──────────────── -->
    <div class="variation" id="v1">
      <img class="v-fig" src="assets/home/figure1.png" alt="">

      <!-- Stars -->
      <div class="v-star" style="left:2%;  top:2%;  width:26%; transform:rotate(-12deg);">
        <img src="assets/stars/star1.png" alt="">
      </div>
      <div class="v-star" style="right:14%; top:1%;  width:13%; transform:rotate(22deg);">
        <img src="assets/stars/star5.png" alt="">
      </div>
      <div class="v-star" style="left:0%;  top:34%; width:12%; transform:rotate(38deg);">
        <img src="assets/stars/star2.png" alt="">
      </div>

      <!-- Title: upper right, right-aligned -->
      <div class="v-title" style="right:5%; top:6%; text-align:right;">
        <span class="v-t1">The</span>
        <span class="v-t2">Contradiction</span>
        <span class="v-t3">of S</span>
      </div>

      <!-- Enter star: right of title, beside "of S" -->
      <a class="v-enter" href="gesture.html" style="right:2%; top:28%; width:16%;">
        <img src="assets/home/enter.png" alt="Enter">
      </a>
    </div>


    <!-- ── Variation 2 ── single seated profile, left ────────────────────── -->
    <div class="variation" id="v2">
      <img class="v-fig" src="assets/home/figure2.png" alt="">

      <!-- Stars -->
      <div class="v-star" style="left:4%;  top:3%;  width:20%; transform:rotate(-35deg);">
        <img src="assets/stars/star2.png" alt="">
      </div>
      <div class="v-star" style="left:3%;  top:22%; width:11%; transform:rotate(15deg);">
        <img src="assets/stars/star1.png" alt="">
      </div>
      <div class="v-star" style="left:-2%; top:40%; width:21%; transform:rotate(28deg);">
        <img src="assets/stars/star5.png" alt="">
      </div>

      <!-- Title: upper right, right-aligned -->
      <div class="v-title" style="right:4%; top:5%; text-align:right;">
        <span class="v-t1">The</span>
        <span class="v-t2">Contradiction</span>
        <span class="v-t3">of S</span>
      </div>

      <!-- Enter star -->
      <a class="v-enter" href="gesture.html" style="right:2%; top:27%; width:15%;">
        <img src="assets/home/enter.png" alt="Enter">
      </a>
    </div>


    <!-- ── Variation 3 ── leaping figure, centre-right ───────────────────── -->
    <div class="variation" id="v3">
      <img class="v-fig" src="assets/home/figure3.png" alt="">

      <!-- Stars -->
      <div class="v-star" style="left:0%;  top:1%;  width:9%;  transform:rotate(-45deg);">
        <img src="assets/stars/star4.png" alt="">
      </div>
      <div class="v-star" style="right:1%; top:0%;  width:26%; transform:rotate(14deg);">
        <img src="assets/stars/star3.png" alt="">
      </div>
      <div class="v-star" style="right:5%; top:15%; width:12%; transform:rotate(-8deg);">
        <img src="assets/stars/star1.png" alt="">
      </div>

      <!-- Title: upper left, left-aligned -->
      <div class="v-title" style="left:3%; top:4%; text-align:left;">
        <span class="v-t1">The</span>
        <span class="v-t2">Contradiction</span>
        <span class="v-t3">of S</span>
      </div>

      <!-- Enter star: beside "of S" -->
      <a class="v-enter" href="gesture.html" style="left:40%; top:27%; width:16%;">
        <img src="assets/home/enter.png" alt="Enter">
      </a>
    </div>


    <!-- ── Variation 4 ── floating figure, centre ────────────────────────── -->
    <div class="variation" id="v4">
      <img class="v-fig" src="assets/home/figure4.png" alt="">

      <!-- Stars -->
      <div class="v-star" style="left:-2%; top:7%;  width:20%; transform:rotate(20deg);">
        <img src="assets/stars/star4.png" alt="">
      </div>
      <div class="v-star" style="right:8%; top:1%;  width:11%; transform:rotate(-15deg);">
        <img src="assets/stars/star5.png" alt="">
      </div>
      <div class="v-star" style="right:2%; top:51%; width:14%; transform:rotate(10deg);">
        <img src="assets/stars/star1.png" alt="">
      </div>

      <!-- Title: upper right, right-aligned -->
      <div class="v-title" style="right:4%; top:5%; text-align:right;">
        <span class="v-t1">The</span>
        <span class="v-t2">Contradiction</span>
        <span class="v-t3">of S</span>
      </div>

      <!-- Enter star -->
      <a class="v-enter" href="gesture.html" style="right:1%; top:26%; width:16%;">
        <img src="assets/home/enter.png" alt="Enter">
      </a>
    </div>


    <!-- ── Variation 5 ── flower-head standing figure ─────────────────────── -->
    <div class="variation" id="v5">
      <img class="v-fig" src="assets/home/figure5.png" alt="">

      <!-- Stars -->
      <div class="v-star" style="left:1%;  top:2%;  width:13%; transform:rotate(-5deg);">
        <img src="assets/stars/star1.png" alt="">
      </div>
      <div class="v-star" style="right:2%; top:3%;  width:13%; transform:rotate(10deg);">
        <img src="assets/stars/star5.png" alt="">
      </div>
      <div class="v-star" style="left:1%;  top:56%; width:15%; transform:rotate(22deg);">
        <img src="assets/stars/star2.png" alt="">
      </div>
      <div class="v-star" style="right:2%; top:63%; width:12%; transform:rotate(-8deg);">
        <img src="assets/stars/star3.png" alt="">
      </div>

      <!-- Enter star: LEFT of title (before "The"), matching Example 5 -->
      <a class="v-enter" href="gesture.html" style="left:6%; top:3%; width:14%;">
        <img src="assets/home/enter.png" alt="Enter">
      </a>

      <!-- Title: upper centre, left-aligned starting after enter star -->
      <div class="v-title" style="left:22%; top:2%; text-align:left;">
        <span class="v-t1">The</span>
        <span class="v-t2">Contradiction</span>
        <span class="v-t3">of S</span>
      </div>
    </div>

  </div><!-- /#home-stage -->


  <!-- ── Bottom navigation ────────────────────────────────────────────────── -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <a href="index.html" class="nav-item active" aria-label="Home">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Home
    </a>
    <a href="gesture.html" class="nav-item" aria-label="Record">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a5 5 0 100 10A5 5 0 0012 2zm0 12c-5.33 0-8 2.67-8 4v1h16v-1c0-1.33-2.67-4-8-4z"/></svg>
      Record
    </a>
    <a href="ar.html" class="nav-item" aria-label="Archive">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 6l3 1v7l-3.5 2L1 13l2-1V6zm3.5 8.5L9 16v-2l-2.5-1.5zM13 4l-4.5 1.5v2L13 6v10l-4.5-1.5v2L13 18l7-2V6l-7-2zm5.5 10L16 15.5v-7L18.5 7v7z"/></svg>
      Archive
    </a>
  </nav>


  <!-- ── Sequential variation rotation via localStorage ───────────────────── -->
  <script>
    var key  = 'home-var';
    var next = (parseInt(localStorage.getItem(key) || '0') % 5) + 1;
    localStorage.setItem(key, next);
    document.getElementById('v' + next).classList.add('active');
  </script>

  <script src="js/app.js"></script>
</body>
</html>
