<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Trace Export — Contradiction of S</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0D0908;color:#F0EAE0;font-family:Georgia,serif;padding:24px;min-height:100vh}
    h1{font-style:italic;font-weight:400;font-size:20px;margin-bottom:6px}
    .sub{color:rgba(240,234,224,0.45);font-style:italic;font-size:12px;margin-bottom:18px;letter-spacing:.05em}
    #status{color:rgba(240,234,224,0.55);font-style:italic;font-size:13px;margin:10px 0 20px;letter-spacing:.04em;min-height:20px}
    .opts{display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
    .opts label{font-style:italic;font-size:12px;color:rgba(240,234,224,0.55)}
    .opts input[type=number]{width:56px;background:rgba(240,234,224,.08);border:1px solid rgba(240,234,224,.2);color:#F0EAE0;padding:4px 8px;font-size:12px}
    #load-btn{padding:9px 22px;background:#981D12;color:#F0EAE0;border:none;cursor:pointer;font-style:italic;font-size:14px;letter-spacing:.05em}
    #load-btn:disabled{opacity:.45;cursor:default}
    .grid{display:flex;flex-wrap:wrap;gap:20px;align-items:flex-start}
    .card{text-align:center;background:rgba(240,234,224,.04);border:1px solid rgba(240,234,224,.1);padding:10px}
    .preview{display:block;background-image:linear-gradient(45deg,#1a1a1a 25%,transparent 25%),linear-gradient(-45deg,#1a1a1a 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#1a1a1a 75%),linear-gradient(-45deg,transparent 75%,#1a1a1a 75%);background-size:12px 12px;background-position:0 0,0 6px,6px -6px,-6px 0;background-color:#111}
    .card-label{margin-top:6px;font-size:10px;font-style:italic;color:rgba(240,234,224,.4);letter-spacing:.05em}
    .dl-btn{display:block;width:100%;margin-top:7px;padding:7px 10px;background:#981D12;color:#F0EAE0;border:none;cursor:pointer;font-style:italic;font-size:12px;letter-spacing:.04em}
    .dl-btn:hover{background:#b52515}
    .dl-all{margin-bottom:18px;padding:10px 24px;background:#4A1010;color:#F0EAE0;border:1px solid rgba(240,234,224,.2);cursor:pointer;font-style:italic;font-size:13px;display:none}
    .dl-all:hover{background:#5a1818}
  </style>
</head>
<body>
<h1>Trace Export</h1>
<div class="sub">renders real garden traces • 384×960 px • transparent background</div>
<div id="status">Click Load to fetch traces from the archive.</div>
<button class="dl-all" id="dl-all-btn">↓ Download All PNGs</button>
<div class="opts">
  <label>Traces: <input type="number" id="cnt" value="8" min="1" max="20"></label>
  <button id="load-btn">Load & Render</button>
</div>
<div class="grid" id="grid"></div>

<script type="module">
import { loadCustomSkel } from './js/custom-skel-draw.js?v=16';

const SB_URL = 'https://oexbsffepplhhhzhyxpy.supabase.co';
const SB_KEY = 'sb_publishable_GgYdLTverVrWPYq93O6pmA_NJ4olWQ5';
const CW = 384, CH = 960, RENDER_FRAMES = 12;

const PALETTE = [
  { name:'bone-white',   bone:'#C8D8E0', petal:'rgba(195,55,55,1)'   },
  { name:'scan-blue',    bone:'#4A8FAA', petal:'rgba(30,85,135,1)'    },
  { name:'tissue-gold',  bone:'#C4A060', petal:'rgba(185,140,50,1)'   },
  { name:'film-grey',    bone:'#9BAAB8', petal:'rgba(82,98,122,1)'    },
  { name:'deep-dark',    bone:'#B07878', petal:'rgba(105,28,28,1)'    },
  { name:'brace-silver', bone:'#A8C0C0', petal:'rgba(60,110,115,1)'   },
  { name:'crimson',      bone:'#D84040', petal:'rgba(195,35,35,1)'    },
  { name:'ivory',        bone:'#E8DDD0', petal:'rgba(160,110,70,1)'   },
];

function _applyVignette(ctx){
  const g=ctx.createRadialGradient(CW/2,CH*.38,0,CW/2,CH*.38,CW*.64);
  g.addColorStop(.30,'rgba(0,0,0,1)');
  g.addColorStop(1.0,'rgba(0,0,0,0)');
  ctx.globalCompositeOperation='destination-in';
  ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);
  ctx.globalCompositeOperation='source-over';
}

async function renderTrace(skel, trace, palette){
  const raw=(trace.skeletons||[]);
  if(!raw.length) return null;

  // Compute average body anchor to centre the figure
  let sx=0,sy=0,cnt=0;
  raw.forEach(f=>{
    const kp=f.kp||[];
    const lH=kp[11],rH=kp[12],lS=kp[5],rS=kp[6];
    if(lH&&rH&&(lH.s||0)>.15&&(rH.s||0)>.15){sx+=(lH.x+rH.x)/2;sy+=(lH.y+rH.y)/2;cnt++;}
    else if(lS&&rS&&(lS.s||0)>.15&&(rS.s||0)>.15){sx+=(lS.x+rS.x)/2;sy+=(lS.y+rS.y)/2+.14;cnt++;}
  });
  const adx=.50-(cnt>0?sx/cnt:.50);
  const ady=.86-(cnt>0?sy/cnt:.60);

  // Sample RENDER_FRAMES evenly
  const frames=[];
  for(let i=0;i<RENDER_FRAMES;i++){
    const idx=Math.round(i*(raw.length-1)/Math.max(1,RENDER_FRAMES-1));
    const f=raw[Math.min(idx,raw.length-1)];
    frames.push({kp:(f.kp||[]).map(k=>({
      x:(k.x??0)+adx, y:(k.y??0)+ady, s:k.s??k.score??0
    }))});
  }

  // Seed from ID for deterministic petal animation
  let seed=0;
  (trace.id||'').slice(0,8).split('').forEach(c=>{seed=(seed*31+c.charCodeAt(0))|0;});
  seed=Math.abs(seed);

  const oc=document.createElement('canvas');
  oc.width=CW; oc.height=CH;
  const ctx=oc.getContext('2d');

  // Draw frames: oldest faintest → newest brightest (same as garden)
  frames.forEach((fr,i)=>{
    const alpha=.07+(i/(frames.length-1))*.72;
    skel.draw(ctx,fr.kp,CW,CH,alpha,seed,0,palette);
  });

  _applyVignette(ctx);
  return oc;
}

let _skel=null;
const _store=[];  // { canvas, name }

document.getElementById('load-btn').addEventListener('click',async()=>{
  const btn=document.getElementById('load-btn');
  const status=document.getElementById('status');
  const grid=document.getElementById('grid');
  const dlAll=document.getElementById('dl-all-btn');
  const count=parseInt(document.getElementById('cnt').value,10)||6;

  btn.disabled=true;
  grid.innerHTML='';
  _store.length=0;
  dlAll.style.display='none';

  if(!_skel){
    status.textContent='Loading skeleton assets…';
    try{ _skel=await loadCustomSkel('assets/skel/'); }
    catch(e){ status.textContent='Asset load failed: '+e.message; btn.disabled=false; return; }
  }

  status.textContent='Fetching from archive…';
  let traces;
  try{
    const r=await fetch(
      `${SB_URL}/rest/v1/pain_traces?select=*&order=created_at.desc&limit=60`,
      {headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}}
    );
    const all=await r.json();
    traces=(all||[]).filter(t=>t.skeletons&&t.skeletons.length>0).slice(0,count);
  }catch(e){ status.textContent='Fetch error: '+e.message; btn.disabled=false; return; }

  if(!traces.length){
    status.textContent='No skeleton traces found in archive yet.';
    btn.disabled=false;
    return;
  }

  status.textContent=`Rendering ${traces.length} traces…`;

  for(let i=0;i<traces.length;i++){
    const trace=traces[i];
    const palette=PALETTE[i%PALETTE.length];
    const fc=await renderTrace(_skel,trace,palette);
    if(!fc) continue;

    _store.push({canvas:fc, name:`trace-${String(i+1).padStart(2,'0')}-${palette.name}.png`});

    // Display preview at 1/3 scale
    const dW=128, dH=320;
    const dC=document.createElement('canvas');
    dC.width=dW; dC.height=dH;
    dC.className='preview';
    dC.getContext('2d').drawImage(fc,0,0,dW,dH);

    const card=document.createElement('div');
    card.className='card';
    card.appendChild(dC);

    const lbl=document.createElement('div');
    lbl.className='card-label';
    lbl.textContent=`${palette.name}`;
    card.appendChild(lbl);

    const dbtn=document.createElement('button');
    dbtn.className='dl-btn';
    dbtn.textContent='↓ PNG';
    const idx=_store.length-1;
    dbtn.addEventListener('click',()=>_download(idx));
    card.appendChild(dbtn);

    grid.appendChild(card);
  }

  dlAll.style.display='inline-block';
  status.textContent=`${traces.length} traces rendered (384×960 px, transparent). Click ↓ PNG to save each.`;
  btn.disabled=false;
});

function _download(idx){
  const {canvas,name}=_store[idx];
  const a=document.createElement('a');
  a.href=canvas.toDataURL('image/png');
  a.download=name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

document.getElementById('dl-all-btn').addEventListener('click',async()=>{
  for(let i=0;i<_store.length;i++){
    _download(i);
    await new Promise(r=>setTimeout(r,220));
  }
});
</script>
</body>
</html>
