<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contradiction of S — AR Experience</title>

  <!-- MindAR + A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      font-family: 'Georgia', serif;
      color: #fff;
      overflow: hidden;
    }

    /* Loading screen shown before camera starts */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 24px;
      padding: 32px;
      text-align: center;
    }

    #loading-screen h1 {
      font-size: 1.4rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #e8d5c4;
    }

    #loading-screen p {
      font-size: 0.9rem;
      color: #888;
      line-height: 1.6;
      max-width: 280px;
    }

    #forum-link {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      color: #666;
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-bottom: 1px solid #444;
      padding-bottom: 2px;
      transition: color 0.3s, border-color 0.3s;
    }
    #forum-link:hover { color: #e8d5c4; border-color: #e8d5c4; }

    #start-btn {
      background: transparent;
      border: 1px solid #e8d5c4;
      color: #e8d5c4;
      padding: 14px 36px;
      font-family: 'Georgia', serif;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }

    #start-btn:hover {
      background: #e8d5c4;
      color: #000;
    }

    /* Instruction overlay (shown during AR, dismissible) */
    #instructions {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: #e8d5c4;
      padding: 12px 24px;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-align: center;
      pointer-events: none;
      z-index: 1000;
      transition: opacity 1s;
    }

    /* Sculpture name label that appears when a target is detected */
    #sculpture-label {
      position: fixed;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.5);
      color: #e8d5c4;
      padding: 8px 20px;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.5s;
      white-space: nowrap;
    }

    #sculpture-label.visible {
      opacity: 1;
    }

    /* Hide default MindAR UI */
    .mindar-ui-overlay { display: none !important; }

    a-scene { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>

  <!-- Landing / loading screen -->
  <div id="loading-screen">
    <h1>Contradiction of S</h1>
    <p>Point your camera at the image card beside each sculpture to reveal its digital presence.</p>
    <button id="start-btn" onclick="startAR()">Begin &rarr;</button>
    <a href="forum.html" id="forum-link">Community Forum →</a>
  </div>

  <!-- Sculpture name label -->
  <div id="sculpture-label"></div>

  <!-- Instruction hint -->
  <div id="instructions">Point camera at a sculpture card</div>

  <!--
    A-Frame scene with MindAR image tracking.
    targets.mind file must contain 4 compiled image targets in this order:
      index 0 → Sculpture 1: Standing on star pedestal with crown
      index 1 → Sculpture 2: Large hair bows and ribbons
      index 2 → Sculpture 3: Sitting in bathtub
      index 3 → Sculpture 4: Standing behind surreal mirror frame
  -->
  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: targets.mind; maxTrack: 1; uiLoading: no; uiScanning: no; uiError: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
    style="display:none;"
  >

    <a-assets>
      <!-- Preload all 4 optimised models -->
      <a-asset-item id="model-01" src="models/sculpture-01.glb"></a-asset-item>
      <a-asset-item id="model-02" src="models/sculpture-02.glb"></a-asset-item>
      <a-asset-item id="model-03" src="models/sculpture-03.glb"></a-asset-item>
      <a-asset-item id="model-04" src="models/sculpture-04.glb"></a-asset-item>
    </a-assets>

    <!-- Camera (required by MindAR) -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Lighting -->
    <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
    <a-light type="directional" color="#fff4e8" intensity="1.2" position="1 3 2"></a-light>
    <a-light type="point" color="#c8a8e8" intensity="0.4" position="-2 1 0"></a-light>

    <!--
      Target 0 — Sculpture 1: Standing on star pedestal with crown
    -->
    <a-entity
      mindar-image-target="targetIndex: 0"
      id="target-0"
      sculpture-tracker="index: 0; name: Standing on Star Pedestal"
    >
      <a-entity
        gltf-model="#model-01"
        position="0 0 0"
        scale="0.15 0.15 0.15"
        rotation="-90 0 0"
        animation-mixer="clip: *; loop: repeat; crossFadeDuration: 0.3"
        class="sculpture-model"
      ></a-entity>
    </a-entity>

    <!--
      Target 1 — Sculpture 2: Large hair bows and ribbons
    -->
    <a-entity
      mindar-image-target="targetIndex: 1"
      id="target-1"
      sculpture-tracker="index: 1; name: Hair Bows and Ribbons"
    >
      <a-entity
        gltf-model="#model-02"
        position="0 0 0"
        scale="0.15 0.15 0.15"
        rotation="-90 0 0"
        animation-mixer="clip: *; loop: repeat; crossFadeDuration: 0.3"
        class="sculpture-model"
      ></a-entity>
    </a-entity>

    <!--
      Target 2 — Sculpture 3: Sitting in bathtub
    -->
    <a-entity
      mindar-image-target="targetIndex: 2"
      id="target-2"
      sculpture-tracker="index: 2; name: Sitting in Bathtub"
    >
      <a-entity
        gltf-model="#model-03"
        position="0 0 0"
        scale="0.15 0.15 0.15"
        rotation="-90 0 0"
        animation-mixer="clip: *; loop: repeat; crossFadeDuration: 0.3"
        class="sculpture-model"
      ></a-entity>
    </a-entity>

    <!--
      Target 3 — Sculpture 4: Standing behind surreal mirror frame
    -->
    <a-entity
      mindar-image-target="targetIndex: 3"
      id="target-3"
      sculpture-tracker="index: 3; name: Behind Surreal Mirror Frame"
    >
      <a-entity
        gltf-model="#model-04"
        position="0 0 0"
        scale="0.15 0.15 0.15"
        rotation="-90 0 0"
        animation-mixer="clip: *; loop: repeat; crossFadeDuration: 0.3"
        class="sculpture-model"
      ></a-entity>
    </a-entity>

  </a-scene>

  <script>
    // Names matching each target index
    const SCULPTURE_NAMES = [
      'Standing on Star Pedestal with Crown',
      'Large Hair Bows and Ribbons',
      'Sitting in Bathtub',
      'Behind Surreal Mirror Frame',
    ];

    // Component: shows sculpture name when a target is found/lost
    AFRAME.registerComponent('sculpture-tracker', {
      schema: {
        index: { type: 'int' },
        name:  { type: 'string' },
      },
      init() {
        const label        = document.getElementById('sculpture-label');
        const instructions = document.getElementById('instructions');

        this.el.addEventListener('targetFound', () => {
          label.textContent = SCULPTURE_NAMES[this.data.index];
          label.classList.add('visible');
          instructions.style.opacity = '0';
        });

        this.el.addEventListener('targetLost', () => {
          label.classList.remove('visible');
          instructions.style.opacity = '1';
        });
      },
    });

    // Start AR: hide landing screen, show scene
    function startAR() {
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('ar-scene').style.display = 'block';

      // Hide instruction hint after 8 seconds
      setTimeout(() => {
        const hint = document.getElementById('instructions');
        if (hint) hint.style.opacity = '0';
      }, 8000);
    }
  </script>

</body>
</html>
